<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FBM Operations Hub — Babaclick</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   APPLE STORE–INSPIRED DESIGN SYSTEM
   Clean, minimal, generous whitespace, SF Pro feel
   ═══════════════════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0}

:root {
  --apple-bg: #fbfbfd;
  --apple-surface: #ffffff;
  --apple-text: #1d1d1f;
  --apple-text-secondary: #6e6e73;
  --apple-text-tertiary: #86868b;
  --apple-text-quaternary: #aeaeb2;
  --apple-blue: #0071e3;
  --apple-blue-hover: #0077ED;
  --apple-green: #34c759;
  --apple-orange: #ff9500;
  --apple-red: #ff3b30;
  --apple-border: rgba(0,0,0,0.04);
  --apple-border-strong: rgba(0,0,0,0.08);
  --apple-radius-sm: 8px;
  --apple-radius-md: 12px;
  --apple-radius-lg: 18px;
  --apple-radius-xl: 22px;
  --apple-radius-pill: 980px;
  --apple-shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --apple-shadow-md: 0 2px 12px rgba(0,0,0,0.06);
  --apple-shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --apple-shadow-card: 0 2px 8px rgba(0,0,0,0.03), 0 8px 30px rgba(0,0,0,0.06);
  --apple-transition: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

body {
  background: var(--apple-bg);
  color: var(--apple-text);
  font-family: 'SF Pro Display', 'SF Pro Text', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'kern', 'liga';
  letter-spacing: -0.01em;
}

input, select, textarea, button { outline: none; font-family: inherit; }
::selection { background: rgba(0,113,227,0.12); color: var(--apple-text); }

/* Scrollbar — macOS-native feel */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 100px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }

/* ═══ MOBILE VIEWPORT OPTIMIZATION ═══ */
@supports (padding: max(0px)) {
  body { padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); }
}

@media (max-width: 768px) {
  html { position: fixed; width: 100%; height: 100%; overflow: hidden; }
  body { width: 100%; height: 100%; overflow: hidden; }
  input, select, textarea { font-size: 16px !important; }
}

@media (orientation: landscape) and (max-height: 500px) {
  [role="statsbar"] > div:nth-child(n+4) { display: none !important; }
  [role="filterpills"] { gap: 3px !important; padding: 2px 8px !important; }
}

/* ═══ KEYFRAMES ═══ */
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fadeInScale { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes breathe { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,113,227,0.12); } 50% { box-shadow: 0 0 0 8px rgba(0,113,227,0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
.fadeIn { animation: fadeIn .3s var(--apple-transition); }
.spin { animation: spin 1s linear infinite; }
.pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }

/* ═══ TABLE — clean Apple grid ═══ */
table { border-collapse: separate; border-spacing: 0; width: 100%; }
th { user-select: none; position: sticky; top: 0; z-index: 10; }
tr.datarow { cursor: pointer; transition: background .2s var(--apple-transition); }
tr.datarow:hover td { background: rgba(0,0,0,0.015); }
tr.datarow:active td { background: rgba(0,0,0,0.03); }

/* ═══ TAG / CHIP — Apple pill style ═══ */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: var(--apple-radius-pill);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0;
  white-space: nowrap;
}

/* ═══ BUTTON — Apple tactile buttons ═══ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  border-radius: var(--apple-radius-pill);
  padding: 10px 20px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  font-family: inherit;
  transition: all .25s var(--apple-transition);
  position: relative;
  overflow: hidden;
  letter-spacing: -0.01em;
}
.btn:hover { filter: brightness(0.95); transform: scale(1.01); }
.btn:active { transform: scale(0.97); filter: brightness(0.90); }

/* ═══ CARD — frosted glass Apple card ═══ */
.card {
  background: var(--apple-surface);
  border: none;
  border-radius: var(--apple-radius-xl);
  box-shadow: var(--apple-shadow-card);
}

/* ═══ INPUT — clean Apple input ═══ */
.input {
  background: var(--apple-bg);
  border: 1.5px solid var(--apple-border-strong);
  border-radius: var(--apple-radius-md);
  padding: 11px 16px;
  color: var(--apple-text);
  font-size: 14px;
  width: 100%;
  transition: all .25s var(--apple-transition);
}
.input:focus {
  border-color: var(--apple-blue);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(0,113,227,0.08);
}
.input::placeholder { color: var(--apple-text-quaternary); }

/* ═══ MODAL — Apple sheet overlay ═══ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(30px) saturate(200%);
  -webkit-backdrop-filter: blur(30px) saturate(200%);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
  animation: fadeIn .2s var(--apple-transition);
}
.modal-box {
  background: var(--apple-surface);
  border-radius: var(--apple-radius-xl);
  width: min(96vw, 900px);
  margin-bottom: 40px;
  animation: scaleIn .3s var(--apple-transition);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06), 0 24px 80px rgba(0,0,0,0.14);
  border: 0.5px solid rgba(255,255,255,0.5);
}

@media (max-width: 768px) {
  .modal-overlay { padding: 20px 12px; }
  .modal-box { width: 100%; border-radius: 20px; }
}

@media (max-width: 480px) {
  .modal-overlay { padding: 12px 8px; align-items: flex-end; }
  .modal-box { width: 100%; border-radius: 24px 24px 0 0; margin-bottom: 0; max-height: 85vh; overflow-y: auto; }
}

/* ═══ SECTION TITLE ═══ */
.section-title {
  font-size: 12px;
  color: var(--apple-text-tertiary);
  letter-spacing: -0.01em;
  font-weight: 700;
  margin-bottom: 14px;
  text-transform: none;
}

/* ═══ GRID HELPERS ═══ */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* ═══ KEY-VALUE PAIRS ═══ */
.kv {
  background: var(--apple-bg);
  border-radius: var(--apple-radius-md);
  padding: 12px 16px;
  border: 1px solid var(--apple-border);
  transition: all .2s var(--apple-transition);
}
.kv:hover { background: #fff; border-color: var(--apple-border-strong); }
.kv .klabel { font-size: 11px; color: var(--apple-text-tertiary); font-weight: 500; margin-bottom: 4px; letter-spacing: 0; text-transform: none; }
.kv .kval { font-size: 15px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; word-break: break-all; color: var(--apple-text); }

/* ═══ BADGES ═══ */
.dhl-badge { background: rgba(255,149,0,0.08); border: 1px solid rgba(255,149,0,0.15); color: #c93400; padding: 3px 10px; border-radius: var(--apple-radius-pill); font-size: 10px; font-weight: 700; letter-spacing: 0.02em; font-family: 'IBM Plex Mono', monospace; }
.mpo-badge { background: rgba(0,113,227,0.05); border: 1px solid rgba(0,113,227,0.12); color: var(--apple-blue); padding: 3px 9px; border-radius: var(--apple-radius-pill); font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }

/* ═══ NAV TABS — minimal Apple segmented ═══ */
.nav-tab {
  background: none;
  border: none;
  color: var(--apple-text-tertiary);
  padding: 12px 20px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: -0.01em;
  transition: all .3s var(--apple-transition);
  position: relative;
}
.nav-tab.active { color: var(--apple-text); font-weight: 600; }
.nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 20px; right: 20px; height: 2px; background: var(--apple-text); border-radius: 2px; }
.nav-tab:hover:not(.active) { color: var(--apple-text-secondary); }

.sup-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--apple-radius-pill); font-size: 10px; font-weight: 600; letter-spacing: 0; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }

.mpo-group-left { border-left: 3px solid rgba(0,113,227,0.25) !important; }

/* ═══ STAT CARDS — large Apple-style metrics ═══ */
.stat-card {
  background: var(--apple-surface);
  border: none;
  border-radius: var(--apple-radius-lg);
  padding: 20px 24px;
  flex: 1;
  min-width: 140px;
  box-shadow: var(--apple-shadow-sm);
  transition: all .3s var(--apple-transition);
}
.stat-card:hover { box-shadow: var(--apple-shadow-md); transform: translateY(-2px); }
.stat-label { font-size: 12px; color: var(--apple-text-tertiary); font-weight: 500; margin-bottom: 8px; letter-spacing: -0.01em; text-transform: none; }
.stat-value { font-size: 32px; font-weight: 700; font-family: 'SF Pro Display', 'Inter', sans-serif; line-height: 1; color: var(--apple-text); letter-spacing: -0.03em; }

@media (max-width: 768px) {
  .stat-card { padding: 14px 16px; min-width: 100%; }
  .stat-label { font-size: 10px; margin-bottom: 6px; }
  .stat-value { font-size: 24px; }
}

@media (max-width: 480px) {
  .stat-card { padding: 12px 14px; }
  .stat-label { font-size: 9px; }
  .stat-value { font-size: 20px; }
}

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-track { flex: 1; height: 4px; background: rgba(0,0,0,0.04); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .5s var(--apple-transition); }

/* ═══ MOBILE RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px; }
  .btn { padding: 12px 16px; font-size: 14px; min-height: 44px; min-width: 44px; }
  .input { padding: 14px 12px; font-size: 16px !important; }
  select { font-size: 16px !important; }
  .nav-tab { padding: 12px 12px; font-size: 11px; }
  .grid2, .grid3 { grid-template-columns: 1fr !important; gap: 10px; }
  .stat-card { min-width: 100%; }
  .stat-value { font-size: 28px; }
  .modal-overlay { padding: 12px; }
  .modal-box { width: 100%; border-radius: 16px; }
  table { font-size: 12px; }
  th, td { padding: 8px 6px; }
  .section-title { font-size: 11px; margin-bottom: 8px; }
  .kv { padding: 8px 10px; }
  .kv .kval { font-size: 13px; }
  
  /* Stats bar - stack vertically */
  [role="statsbar"] { display: flex !important; flex-wrap: wrap !important; gap: 8px !important; padding: 8px 12px !important; }
  [role="statsbar"] > div { flex: 1 1 calc(50% - 4px) !important; }
  
  /* Filter bar - wrap and adjust */
  [role="filterbar"] { display: flex !important; flex-wrap: wrap !important; gap: 8px !important; padding: 8px 12px !important; }
  [role="filterbar"] > input, [role="filterbar"] > select { flex: 1 1 calc(50% - 4px) !important; min-width: 0 !important; }
  [role="filterbar"] > button { flex: 1 1 calc(50% - 4px) !important; }
  
  /* Filter pills - wrap */
  [role="filterpills"] { display: flex !important; gap: 6px !important; padding: 6px 12px !important; overflow-x: auto !important; flex-wrap: wrap !important; }
  
  /* Selection bar - compact */
  [role="selectionbar"] { padding: 8px 12px !important; gap: 8px !important; }
  [role="selectionbar"] > span { font-size: 12px !important; }
  [role="selectionbar"] > button { font-size: 12px !important; padding: 6px 12px !important; height: 36px !important; }
  
  div[role="pagination"] { gap: 6px; padding: 8px 12px !important; font-size: 10px; }
}

@media (max-width: 600px) {
  /* Stats bar - show 2 per row */
  [role="statsbar"] > div { flex: 1 1 calc(50% - 4px) !important; min-width: 0 !important; }
  [role="statsbar"] > div > div:first-child { font-size: 9px !important; }
  [role="statsbar"] > div > div:last-child { font-size: 18px !important; }
  
  /* Hide secondary stats on very small screens */
  [role="statsbar"] > div:nth-child(n+5) { display: none !important; }
}

@media (max-width: 480px) {
  body { font-size: 13px; }
  .btn { padding: 14px 14px; font-size: 13px; min-height: 44px; }
  .input { padding: 14px 12px; font-size: 16px !important; }
  select { font-size: 16px !important; }
  .modal-box { width: 100%; margin-bottom: 20px; border-radius: 16px; }
  .nav-tab { padding: 10px 8px; font-size: 10px; }
  .nav-tab.active::after { left: 8px; right: 8px; }
  .stat-value { font-size: 24px; }
  .stat-card { padding: 14px 16px; }
  table { font-size: 11px; }
  th, td { padding: 6px 4px; }
  .kv { padding: 8px 10px; }
  .kv .kval { font-size: 12px; }
  .tag { padding: 2px 8px; font-size: 10px; }
  textarea { min-height: 100px; }
  .section-title { font-size: 10px; }
  
  /* Mobile-first stacking */
  [role="statsbar"] > div { flex: 1 1 calc(50% - 4px) !important; }
  [role="statsbar"] > div > div:first-child { font-size: 8px !important; }
  [role="statsbar"] > div > div:last-child { font-size: 16px !important; }
  
  [role="filterbar"] > input, [role="filterbar"] > select, [role="filterbar"] > button { flex: 1 1 100% !important; width: 100% !important; }
  
  /* Hide tertiary buttons on mobile */
  [role="filterbar"] > button:nth-child(n+3) { display: none !important; }
  
  [role="selectionbar"] { padding: 6px 8px !important; flex-wrap: wrap !important; }
  [role="selectionbar"] > span { font-size: 11px !important; }
  [role="selectionbar"] > button { font-size: 11px !important; padding: 6px 10px !important; height: 36px !important; flex: 1 1 auto !important; }
}

@media (max-width: 400px) {
  .stat-value { font-size: 20px; }
  .btn { padding: 12px 12px; font-size: 12px; }
  table { font-size: 10px; }
  th, td { padding: 5px 3px; }
  
  /* Very compact mobile */
  [role="statsbar"] > div { flex: 1 1 calc(50% - 4px) !important; }
  [role="statsbar"] > div > div:first-child { font-size: 7px !important; }
  [role="statsbar"] > div > div:last-child { font-size: 14px !important; }
  
  [role="filterbar"] { gap: 6px !important; padding: 6px 8px !important; }
  [role="filterbar"] > input, [role="filterbar"] > select { flex: 1 1 100% !important; }
  [role="filterbar"] > button { flex: 1 1 100% !important; }
}

@media (hover: none) and (pointer: coarse) {
  .btn, .nav-tab, .input, select { min-height: 44px; }
  .btn:active, .nav-tab:active { opacity: 0.8; }
  body { font-size: 14px; }
  
  /* Ensure mobile-friendly spacing on touch devices */
  .btn { padding: 14px 16px !important; }
  .input { padding: 14px 12px !important; font-size: 16px !important; }
}

/* ═══ DESKTOP FILTER LAYOUT ═══ */
div[role="filters"] { gap: 10px; padding: 12px 16px; overflow-x: auto; }
div[role="filters"] > input:first-child { flex: 1 1 auto; min-width: 180px; }
div[role="filters"] > select { flex: 0 0 130px; }
div[role="filters"] > input[type="date"] { flex: 0 0 140px; }
div[role="filters"] > button { flex: 0 0 auto; }

/* ═══ TABLE COLUMN VISIBILITY ═══ */
@media (max-width: 1200px) {
  th[data-col="buyLink"], td[data-col="buyLink"] { display: none; }
  th[data-col="poId"], td[data-col="poId"] { display: none; }
}

@media (max-width: 900px) {
  th[data-col="sku"], td[data-col="sku"] { display: none; }
  th[data-col="buyLink"], td[data-col="buyLink"] { display: none; }
  th[data-col="poId"], td[data-col="poId"] { display: none; }
  th[data-col="notes"], td[data-col="notes"] { display: none; }
}

@media (max-width: 600px) {
  th[data-col="qty"], td[data-col="qty"] { display: none; }
  th[data-col="status"], td[data-col="status"] { font-size: 9px; padding: 4px 4px; }
  th[data-col="carrier"], td[data-col="carrier"] { display: none; }
  th[data-col="trackingNum"], td[data-col="trackingNum"] { display: none; }
  th[data-col="shipByDate"], td[data-col="shipByDate"] { font-size: 9px; padding: 4px 4px; }
  table { font-size: 10px; }
}

@media (max-width: 480px) {
  th[data-col="qty"], td[data-col="qty"] { display: none; }
  th[data-col="productName"], td[data-col="productName"] { font-size: 9px; }
  th[data-col="orderDate"], td[data-col="orderDate"] { display: none; }
  th[data-col="deliveryDate"], td[data-col="deliveryDate"] { display: none; }
  th[data-col="status"], td[data-col="status"] { font-size: 9px; padding: 3px 3px; }
  table { font-size: 9px; }
  tr.datarow { line-height: 1; }
}

/* ═══ OPERATIONS TABLE MOBILE ═══ */
@media (max-width: 768px) {
  th[data-col="hts"], td[data-col="hts"],
  th[data-col="profit"], td[data-col="profit"] { display: none; }
  div[role="stats-bar"] { display: none !important; }
  table { font-size: 10px; }
  thead tr { background: var(--apple-surface); }
  th { padding: 6px 8px !important; font-size: 8px; }
  td { padding: 5px 8px !important; }
  
  div[role="filters"] { gap: 8px; padding: 10px 16px; overflow-x: auto; }
  div[role="filters"] > input:first-child { flex: 1 1 auto; min-width: 120px; }
  div[role="filters"] > select { flex: 0 0 110px; }
  div[role="filters"] > input[type="date"] { flex: 0 0 120px; }
  div[role="filters"] > button { flex: 0 0 auto; }
}

@media (max-width: 480px) {
  div[role="filters"] { gap: 8px; padding: 10px 16px; overflow-x: auto; }
  div[role="filters"] > input:first-child { flex: 1 1 auto; min-width: 100px; }
  div[role="filters"] > select { flex: 0 0 100px; }
  div[role="filters"] > input[type="date"] { flex: 0 0 110px; }
  div[role="filters"] > button { flex: 0 0 auto; padding: 5px 10px; }
  div[role="filters"] > div { flex: 0 1 100%; gap: 4px; padding: 2px; }
  div[role="filters"] > div > button { font-size: 9px; padding: 5px 8px; height: 26px; }
  div[role="filters"] > button { flex: 0 1 auto; }

  div[role="pagination"] { 
    gap: 4px; font-size: 9px; padding: 6px 10px !important;
    flex-direction: column; align-items: flex-start;
  }
  div[role="pagination"] > div:first-child { width: 100%; flex-wrap: wrap; }
  div[role="pagination"] > div:last-child { width: 100%; flex-wrap: wrap; gap: 3px; }
  div[role="pagination"] button { padding: 4px 5px; font-size: 9px; }
}

/* ═══ MOBILE MENU (Apple slide-in) ═══ */
@keyframes slideInMenu { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }

.mobile-menu-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s var(--apple-transition);
  z-index: 150;
}
.mobile-menu-overlay.active { opacity: 1; pointer-events: auto; }

.mobile-menu-panel {
  position: fixed; left: 0; top: 0; height: 100vh;
  width: 85vw; max-width: 340px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: saturate(200%) blur(30px); -webkit-backdrop-filter: saturate(200%) blur(30px);
  border-right: 0.5px solid rgba(0,0,0,0.05);
  z-index: 160;
  transform: translateX(-100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  overflow-y: auto; padding-top: 70px;
  will-change: transform;
  box-shadow: 6px 0 30px rgba(0,0,0,0.06);
}
.mobile-menu-panel.active { transform: translateX(0); }

.mobile-menu-item {
  display: block; width: 100%; padding: 16px 24px;
  border: none; background: none;
  color: var(--apple-text); text-align: left;

// Global schema object - fetched once on app load and used everywhere
let COLUMNS = null;

// Fetch schema from server
async function loadSchema() {
  if (COLUMNS) return COLUMNS; // Already loaded
  try {
    const res = await fetch(API.schema());
    if (!res.ok) throw new Error(`Schema fetch failed: ${res.status}`);
    const data = await res.json();
    COLUMNS = data.columns || {};
    console.log('✅ Schema loaded from server:', Object.keys(COLUMNS).length, 'columns');
    return COLUMNS;
  } catch (err) {
    console.error('❌ Failed to load schema:', err);
    // Return null - schema is optional, app continues with defaults
    return null;
  }
}

// Helper functions to reference schema columns safely
function getColumn(key) {
  // Returns the column metadata for a key
  // Usage: getColumn('totalSellPrice').db → 'total_sell_price'
  //        getColumn('totalSellPrice').name → 'Total Sell Price (USD)'
  //        getColumn('totalSellPrice').editable → true/false
  
  // EXAMPLES - How to use the centralized schema in your code:
  // 
  // 1. Get database column name (for API calls):
  //    const dbName = toDbName('totalSellPrice'); // 'total_sell_price'
  //    const updateObj = { [dbName]: 100 };
  //    fetch(API.updateOrder(order.id), { body: JSON.stringify(updateObj) })
  //
  // 2. Get display name (for UI labels):
  //    const label = getColumn('totalSellPrice').name; // 'Total Sell Price (USD)'
  //
  // 3. Check if field is editable:
  //    if (getColumn('totalSellPrice').editable) { /* show edit UI */ }
  //
  // 4. Get field type for parsing/formatting:
  //    if (getColumn('weight').type === 'numeric') { /* parseFloat */ }
  //
  // 5. Get grouped columns for organized UI:
  //    const financialCols = COLUMNS_BY_GROUP.financials;
  //
  if (!COLUMNS || !COLUMNS[key]) {
    console.warn(`Column '${key}' not found in schema`);
    return { db: key, name: key, type: 'string', editable: false };
  }
  return COLUMNS[key];
}

// Convert camelCase field name to database snake_case name
function toDbName(camelKey) {
  if (!COLUMNS) return camelKey; // Fallback if schema not loaded
  const col = COLUMNS[camelKey];
  return col ? col.db : camelKey;
}

// Convert database snake_case name to camelCase field name
function toCamelKey(dbName) {
  if (!COLUMNS) return dbName;
  for (const [key, col] of Object.entries(COLUMNS)) {
    if (col.db === dbName) return key;
  }
  return dbName;
}

const RM_RATES = [
  {wFrom:0,wTo:2,priceItem:4.59,priceKg:2.27,fuel:0.065,duty:0.5},
  {wFrom:2,wTo:5,priceItem:8.59,priceKg:2.15,fuel:0.065,duty:0.5},

  {wFrom:25,wTo:30,priceItem:75.83,priceKg:0,fuel:0.065,duty:0.5},
];

function calcRMShipping(weightKg) {
  if (!weightKg || weightKg <= 0) return null;
  const r = RM_RATES.find(r => weightKg >= r.wFrom && weightKg < r.wTo);
  if (!r) return null;
  const base = r.priceItem + (r.priceKg * weightKg);
  const total = (base * (1 + r.fuel)) + r.duty;
  return Math.round(total * 100) / 100;
}

/* ═══ LIVE PROFITABILITY CALCULATOR ═══ */
// Replicates the exact Excel formulas:
//   Total Buy inc VAT = (unitPrice × bQty) + deliveryFee
//   Total Buy exc VAT = (delivFee / 1.2) + IF(VAT=YES, (unitPrice × bQty)/1.2, unitPrice × bQty)
//   Shipping = Royal Mail rate card lookup on orderWeight
//   Profit = (sellUSD × 0.847) - ((buyExcVAT × 1.1 + shipping) × GBP_USD) - 2
function calcProfitability({ sellPriceUSD, unitBuyPrice, deliveryFee, bQty, vatStatus, orderWeightKg, gbpUsdRate }) {
  const sell = parseFloat(sellPriceUSD) || 0;
  const unit = parseFloat(unitBuyPrice) || 0;
  const deliv = parseFloat(deliveryFee) || 0;
  const bq = parseFloat(bQty) || 1;
  const vat = (vatStatus || 'NO').toUpperCase();
  const wt = parseFloat(orderWeightKg) || 0;
  const rate = parseFloat(gbpUsdRate) || 1.34;

  if (!unit) return null;

  const totalBuyIncVAT = (unit * bq) + deliv;
  const totalBuyExcVAT = (deliv / 1.2) + (vat === 'YES' ? (unit * bq) / 1.2 : unit * bq);
  const orderWeight = wt;
  const shippingGBP = calcRMShipping(orderWeight);

  let expectedProfit = null;
  let profitMarginPct = null;
  if (shippingGBP !== null && sell > 0) {
    const revenueUSD = sell * 0.847;
    const costUSD = ((totalBuyExcVAT * 1.1) + shippingGBP) * rate;
    expectedProfit = revenueUSD - costUSD - 2;
    profitMarginPct = (expectedProfit / sell) * 100;
  }

  return {
    totalBuyIncVAT: Math.round(totalBuyIncVAT * 100) / 100,
    totalBuyExcVAT: Math.round(totalBuyExcVAT * 100) / 100,
    orderWeight: Math.round(orderWeight * 10000) / 10000,
    shippingGBP,
    expectedProfit: expectedProfit !== null ? Math.round(expectedProfit * 100) / 100 : null,
    profitMarginPct: profitMarginPct !== null ? Math.round(profitMarginPct * 10) / 10 : null,
    isProfitable: expectedProfit !== null ? expectedProfit > 0 : null,
  };
}

// ═══ AUDIT LOGGING SYSTEM ═══
const AUDIT_LOG_KEY = 'babaclick_audit_logs';

function logChange(orderId, field, oldValue, newValue, details='') {
  if (!window.CURRENT_USER) return; // Only log if user is logged in
  
  const logEntry = {
    timestamp: new Date().toISOString(),
    user: window.CURRENT_USER.name,
    username: window.CURRENT_USER.username,
    role: window.CURRENT_USER.role,
    orderId: orderId,
    field: field,
    oldValue: oldValue,
    newValue: newValue,
    details: details
  };
  
  // Get existing logs from local storage
  let logs = [];
  try {
    logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
  } catch (e) {
    logs = [];
  }
  
  // Add new log entry
  logs.push(logEntry);
  
  // Keep only last 5000 entries to avoid storage overflow
  if (logs.length > 5000) logs = logs.slice(-5000);
  
  // Save to local storage
  localStorage.setItem(AUDIT_LOG_KEY, JSON.stringify(logs));
  
  console.log(`✓ Logged: ${field} for order ${orderId} by ${window.CURRENT_USER.name}`);
}

// Get audit history for a specific order
function getOrderAuditHistory(orderId) {
  try {
    const logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
    return logs.filter(log => log.orderId === orderId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  } catch (e) {
    return [];
  }
}

// Get all logs (for admin view) with optional filtering
function getAllAuditLogs(filter = {}) {
  try {
    let logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
    
    if (filter.user) logs = logs.filter(l => l.user === filter.user);
    if (filter.field) logs = logs.filter(l => l.field === filter.field);
    if (filter.startDate) logs = logs.filter(l => new Date(l.timestamp) >= new Date(filter.startDate));
    if (filter.endDate) logs = logs.filter(l => new Date(l.timestamp) <= new Date(filter.endDate));
    
    return logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  } catch (e) {
    return [];
  }
}

}

  if (o.discrepancy != null && Number(o.discrepancy) !== 0) return 'discrepancy';

function excelSerialToDate(serial){
  // Excel serial date: days since 1900-01-01 (with Lotus 1900 leap year bug offset)
  const utc_days = Math.floor(serial) - 25569;
  return new Date(utc_days * 86400 * 1000);
}
function parseShipDate(v){
  if(!v||v==='-'||v===''||v==null)return null;
  const num=Number(v);
  // Excel serial: numeric value in plausible date range (year ~2000-2100)
  if(!isNaN(num) && num>36526 && num<73050) return excelSerialToDate(num);
  const d=new Date(v);
  if(!isNaN(d.getTime()))return d;
  return null;
}
function formatDateVal(v){
  if(!v||v==='-'||v==null) return '—';
  const d = parseShipDate(v);
  if(!d||isNaN(d.getTime())) return String(v).slice(0,10);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function ensureProtocol(u){
  if(!u) return null;
  const s=String(u).trim();
  if(!s) return null;
  if(/^https?:\/\//i.test(s)) return s;
  if(s.startsWith('mailto:')||s.startsWith('tel:')) return s;
  return 'https://' + s.replace(/^\/\//,'');
}

/* ═══ SETUP WIZARD ═══ */
function SetupWizard({onDone,onDemo}) {
  const [step,setStep]=useState(0);
  const [testStatus,setTestStatus]=useState(null);
  const [testing,setTesting]=useState(false);

  async function testConnection() {
    setTesting(true);
    try {
      const res = await fetch(API.health());
      if (res.ok) {
        const data = await res.json();
        setTestStatus(`success: connected to ${data.database || 'database'}`);
      } else {
        setTestStatus(`error: ${res.status} ${res.statusText}`);
      }
    } catch (e) {
      setTestStatus(`error: ${e.message}`);
    }
    setTesting(false);
  }

  const instructions = [
    {title:'1. Install PostgreSQL',steps:['Install PostgreSQL via Homebrew: brew install postgresql','Start the service: brew services start postgresql','Create a database for the app']},
    {title:'2. Configure Environment',steps:['Create a .env file in the project root','Set DATABASE_URL=postgresql://user:password@localhost:5432/fbm_hub_dev','Set JWT_SECRET and other required variables']},
    {title:'3. Start the Server',steps:['Run: npm start','Server will connect to PostgreSQL automatically','Check the terminal for connection success message']},
  ];

  if (step<3) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(ellipse at 50% 10%, rgba(29,78,216,0.1) 0%, transparent 60%)'}}>
      <div style={{width:'min(100%,540px)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:10}}>⚙️</div>
          <div style={{fontSize:22,fontWeight:800,color:'#1d1d1f',letterSpacing:'-0.02em'}}>Database Setup</div>
          <div style={{color:'#6e6e73',fontSize:12,marginTop:5}}>Step {step+1} of 4</div>
        </div>
        <div className="card" style={{padding:28}}>
          {step<3 && (
            <>
              <div style={{color:'#0071e3',fontWeight:800,fontSize:14,marginBottom:16}}>{instructions[step].title}</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                {instructions[step].steps.map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',background:'rgba(255,255,255,0.02)',borderRadius:8,padding:'10px 14px',border:'1px solid #e8e8ed'}}>
                    <div style={{width:20,height:20,borderRadius:'50%',background:'#1d4ed8',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,flexShrink:0}}>{i+1}</div>
                    <div style={{color:'#86868b',fontSize:12,whiteSpace:'pre-line',lineHeight:1.6}}>{s}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                {step>0&&<button className="btn" style={{background:'#f5f5f7',color:'#86868b'}} onClick={()=>setStep(s=>s-1)}>← Back</button>}
                <button className="btn" style={{background:'#1d4ed8',color:'#fff',flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>s+1)}>Done, next →</button>
              </div>
            </>
          )}
        </div>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={onDemo} style={{background:'none',border:'none',color:'#86868b',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Skip setup — use demo mode</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'min(100%,520px)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:10}}>�️</div>
          <div style={{fontSize:22,fontWeight:800,color:'#1d1d1f',letterSpacing:'-0.02em'}}>Database Connection</div>
        </div>
        <div className="card" style={{padding:28,display:'flex',flexDirection:'column',gap:16}}>
          <div style={{color:'#86868b',fontSize:12}}>The app connects to PostgreSQL automatically via the DATABASE_URL environment variable.</div>
          {testStatus&&<div style={{background:testStatus.startsWith('success')?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)',border:`1px solid ${testStatus.startsWith('success')?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'}`,borderRadius:8,padding:12,fontSize:11,color:testStatus.startsWith('success')?'#22c55e':'#ef4444'}}>
            {testStatus.split(': ')[1]}
          </div>}
          <button className="btn" disabled={testing} style={{background:'rgba(96,165,250,0.1)',color:'#0071e3',border:'1px solid rgba(96,165,250,0.3)',width:'100%',justifyContent:'center',fontSize:12,marginTop:8}} onClick={testConnection}>
            {testing?'Testing...':'Test Database Connection →'}
          </button>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button className="btn" style={{background:'#f5f5f7',color:'#86868b'}} onClick={()=>setStep(2)}>← Back</button>
            <button className="btn" style={{background:'#1d4ed8',color:'#fff',flex:1,justifyContent:'center'}}
              onClick={()=>onDone({})}>Continue →</button>
          </div>
        </div>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={onDemo} style={{background:'none',border:'none',color:'#86868b',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Use demo mode instead</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ LOGIN ═══ */
function LoginScreen({onLogin}) {
  const [mode, setMode] = React.useState('login'); // 'login' | 'signup'
  const [email, setEmail] = React.useState('');
  const [name, setName] = React.useState('');
  const [role, setRole] = React.useState('importer');
  const [status, setStatus] = React.useState(''); // 'sending', 'sent', 'pending', 'error'
  const [message, setMessage] = React.useState('');
  const [token, setToken] = React.useState(new URLSearchParams(window.location.search).get('token') || '');

  React.useEffect(() => {
    if (token) {
      verifyToken(token);
    }
  }, []);

  async function sendLoginEmail(e) {
    e.preventDefault();
    if (!email) return;

    // ⚡ OWNER AUTO-LOGIN
    if (email.toLowerCase() === 'parttthh@gmail.com') {
      const demoUser = {
        email: email.toLowerCase(),
        name: 'Parth Sharma',
        role: 'owner',
        loginTime: new Date().toISOString()
      };
      window.CURRENT_USER = demoUser;
      window.SESSION_TOKEN = 'demo-session-' + Date.now();
      localStorage.setItem('sessionToken', window.SESSION_TOKEN);
      localStorage.setItem('currentUser', JSON.stringify(demoUser));
      onLogin(demoUser);
      return;
    }

    setStatus('sending');
    setMessage('');

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(API.sendLoginEmail(), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email}),
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Failed to send email');
        return;
      }

      if (data.status === 'pending') {
        setStatus('pending');
        setMessage('✓ Awaiting admin approval. You\'ll receive an email when approved.');
      } else {
        setStatus('sent');
        setMessage('✓ Login link sent to ' + email + '. Check your email (15 min expiry).');
      }
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    if (!email || !name || !role) {
      setStatus('error');
      setMessage('Fill all fields');
      return;
    }

    setStatus('sending');
    setMessage('');

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(API.signup(), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, name, role}),
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Signup failed');
        return;
      }

      setStatus('pending');
      setMessage('✓ Signup request sent! Awaiting admin approval.');
      setTimeout(() => {
        setMode('login');
        setEmail('');
        setName('');
        setRole('importer');
        setStatus('');
        setMessage('');
      }, 3000);
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

  async function verifyToken(t) {
    try {
      setStatus('sending');
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(API.verifyToken(t), {
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Invalid token');
        return;
      }

      window.CURRENT_USER = data.user;
      window.SESSION_TOKEN = data.sessionToken;
      localStorage.setItem('sessionToken', data.sessionToken);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      
      onLogin(data.user);
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

      <div style={{width: 'min(100%, 400px)'}}>
        {/* Logo — Apple-clean centered */}
        <div style={{textAlign:'center', marginBottom:40}}>
          <div style={{width:56, height:56, background:'#1d1d1f', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, margin:'0 auto 16px', boxShadow:'0 4px 20px rgba(0,0,0,0.12)'}}>📦</div>
          <div style={{fontSize:28, fontWeight:700, color:'#1d1d1f', letterSpacing:'-0.03em', lineHeight:1.1}}>FBM Operations</div>
          <div style={{color:'#86868b', fontSize:14, marginTop:8, fontWeight:400, letterSpacing:'-0.01em'}}>Sign in to your Babaclick hub</div>

              Sign In

            </div>
          )}

          {status === 'error' && (
            <div style={{textAlign:'center', padding:'28px 0'}}>
              <div style={{fontSize:40, marginBottom:16}}>⚠️</div>
              <div style={{color:'#1d1d1f', fontSize:17, fontWeight:600, marginBottom:8, letterSpacing:'-0.01em'}}>Something went wrong</div>
              <div style={{color:'#86868b', fontSize:14, lineHeight:1.6, marginBottom:20}}>{message}</div>
              <button
                onClick={() => {setStatus(''); setEmail(''); setName(''); setMessage('');}}
                style={{background:'#f5f5f7', border:'none', borderRadius:10, color:'#0071e3', padding:'10px 20px', cursor:'pointer', fontSize:14, fontWeight:500, transition:'all 0.2s'}}
              >
                Try again
              </button>
            </div>
          )}
        </div>

        {/* Footer hint */}
        <div style={{textAlign:'center', marginTop:24, fontSize:13, color:'#86868b', letterSpacing:'-0.01em'}}>
          Ask your admin to approve your email for access
        </div>
      </div>
    </div>
  );
}

/* ═══ ORDER DETAIL MODAL ═══ */
function OrderModal({order,role,onClose,onUpdate,syncCell,onCreateMultiPO,setOrders,getCombinedDiscrepancy,orders}) {
  if(!order) return null;
  const [showExceptionForm, setShowExceptionForm] = React.useState(false);
  const [exceptionReason, setExceptionReason] = React.useState('');
  const [partialQtyToSource, setPartialQtyToSource] = React.useState('');
  const [showFulfillmentForm, setShowFulfillmentForm] = React.useState(false);
  const [fulfillmentWeight, setFulfillmentWeight] = React.useState('');
  const [fulfillmentLoading, setFulfillmentLoading] = React.useState(false);
  const [fulfillmentError, setFulfillmentError] = React.useState('');
  const [labelData, setLabelData] = React.useState(null);

  // Live profitability state — sourcer edits these
  const [editUnitBuy, setEditUnitBuy] = React.useState(order.unitBuyPriceIncVAT != null ? String(order.unitBuyPriceIncVAT) : '');
  const [editDelivFee, setEditDelivFee] = React.useState(order.deliveryFeePerLine != null ? String(order.deliveryFeePerLine) : '');
  const [editBQty, setEditBQty] = React.useState(order.bQty != null ? String(order.bQty) : '1');
  const [editWeight, setEditWeight] = React.useState(order.orderWeight != null ? String(order.orderWeight) : '');
  const [refData, setRefData] = React.useState(null);
  const [refLoading, setRefLoading] = React.useState(false);
  const [gbpUsdRate, setGbpUsdRate] = React.useState('1.34');

  // Fetch current GBP/USD rate from backend
  React.useEffect(() => {
    const base = window.API_BASE || '';
    fetch(`${base}/api/exchange-rate/current`)
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (data && data.gbp_usd_rate) setGbpUsdRate(String(data.gbp_usd_rate)); })
      .catch(() => {});
  }, []);

  // Fetch ASIN reference data on mount
  React.useEffect(() => {
    if (!order.asin) return;
    setRefLoading(true);
    const base = window.API_BASE || '';
    fetch(`${base}/api/reference/${encodeURIComponent(order.asin)}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (data) setRefData(data); })
      .catch(() => {})
      .finally(() => setRefLoading(false));
  }, [order.asin]);

  // Live profitability calculation
  const liveCalc = useMemo(() => {
    // orderWeight: editWeight is total order weight; refData.weight_kg is per-item so multiply by sQty
    const sq = parseFloat(order.sQty) || 1;
    const orderWeightKg = editWeight ? parseFloat(editWeight) : (order.orderWeight || (refData ? refData.weight_kg * sq : null));
    const vatSt = order.vatStatus || (refData ? refData.vat_status : 'NO');
    return calcProfitability({
      sellPriceUSD: order.totalSellPrice,
      unitBuyPrice: editUnitBuy,
      deliveryFee: editDelivFee,
      bQty: editBQty,
      vatStatus: vatSt,
      orderWeightKg: orderWeightKg,
      gbpUsdRate: gbpUsdRate,
    });
  }, [editUnitBuy, editDelivFee, editBQty, editWeight, order.totalSellPrice, order.sQty, order.orderWeight, order.vatStatus, refData, gbpUsdRate]);

  // Show live calc when available, fall back to stored DB profit
  const displayProfit = liveCalc && liveCalc.expectedProfit != null
    ? liveCalc.expectedProfit
    : order.expectedProfit != null ? Number(order.expectedProfit) : null;
  const displayProfitable = displayProfit != null ? displayProfit > 0 : null;
  const displayMargin = liveCalc && liveCalc.profitMarginPct != null
    ? liveCalc.profitMarginPct
    : (displayProfit != null && order.totalSellPrice ? (displayProfit / Number(order.totalSellPrice)) * 100 : null);
  
  const st=rowState(order);
  const s=STATE[st];
  const ri=ROLES[role];
  const sup=order.supplier||getSupplier(order.buyLink);

  function copy(text) { navigator.clipboard?.writeText(String(text||'')); }

  const profit = order.expectedProfit!=null?Number(order.expectedProfit):null;
  const isOverdue = !order.labelPrinted && order.shipByDate && (()=>{const d=parseShipDate(order.shipByDate);return d&&!isNaN(d)&&d<new Date();})();

  // Reasons that require sourcing a new order
  const sourcingReasons = ['Out of Stock', 'Missing Parts', 'Defective - Reclaim Stock'];
  // Reasons that are handled via refund only
  const refundReasons = ['Broken Item', 'Wrong Item Received', 'Customer Refused'];
  // Reasons for partial refund + source new
  const partialRefundReasons = ['Partial Refund - Keep Some'];
  
  const isSourceNewRequired = sourcingReasons.includes(exceptionReason);
  const isPartialRefund = partialRefundReasons.includes(exceptionReason);
  
  // Calculate discrepancy (qty gap) - sum all rows with same Order ID
  const discrepancy = getCombinedDiscrepancy(order);

  const handleCreateExceptionPO = async () => {
    if (!exceptionReason) {
      alert('Please select a reason');
      return;
    }

    if ((isSourceNewRequired || isPartialRefund) && discrepancy <= 0) {
      alert('No discrepancy to source. Order qty matches received qty.');
      return;
    }

    if (isPartialRefund && !partialQtyToSource) {
      alert('Please enter qty to source for partial refund');
      return;
    }

    const qtyToSource = isPartialRefund ? parseInt(partialQtyToSource) || 0 : discrepancy;

    // Case 1: Full Refund (no new order row needed)
    if (refundReasons.includes(exceptionReason)) {
      onUpdate(order.id, {
        exceptionReason: exceptionReason,
        exceptionPOCreated: true,
        status: 'refund_requested'
      });
      syncCell(order.sheetRow, COL.exceptionReason, exceptionReason);
      syncCell(order.sheetRow, COL.exceptionPOCreated, 'REFUND_REQUEST');
      setShowExceptionForm(false);
      setExceptionReason('');
      setPartialQtyToSource('');
      return;
    }

    // Case 2 & 3: Source New (full or partial) - CREATE NEW ROW
    if (isSourceNewRequired || isPartialRefund) {
      if (qtyToSource <= 0) {
        alert('Qty to source must be greater than 0');
        return;
      }

      // Create a new order row with same Order ID but different supplier
      const newMultiPOOrder = {
        id: Math.max(...orders.map(o => o.id || 0)) + 1, // New unique ID
        sheetRow: Math.max(...orders.map(o => o.sheetRow || 0)) + 1, // Next available row
        orderId: order.orderId, // SAME ORDER ID
        asin: order.asin,
        sku: order.sku,
        productName: order.productName + ' [Exception PO - Sourcing Required]',
        sQty: qtyToSource, // Exception PO sells only the discrepancy qty
        bQty: qtyToSource,
        qtyReceived: null,
        totalSellPrice: order.totalSellPrice * (qtyToSource / (order.sQty || 1)),
        buyLink: null,
        poId: order.poId + '-EXC',
        supplier: 'TBD - Sourcing Required',
        unitBuyPriceIncVAT: null,
        totalBuyPriceIncVAT: null,
        status: 'pending_source',
        multiPO: true,
        exceptionReason: exceptionReason,
        isExceptionPO: true,
        notes: `Exception PO created due to: ${exceptionReason}. Source ${qtyToSource} qty.`,
        createdDate: new Date().toISOString(),
        createdBy: window.CURRENT_USER?.name || window.CURRENT_USER?.email || 'Unknown',
        labelPrinted: false,
        discrepancy: null
      };

      // Add new row to orders list
      setOrders?.(prev => [...prev, newMultiPOOrder]);

      // Save exception PO to database
      try {
        const userEmail = window.CURRENT_USER?.email || 'unknown';
        const res = await fetch(API.createOrder(), {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'x-user-email': userEmail},
          body: JSON.stringify({
            order_id: order.orderId,
            order_date: order.orderDate || null,
            product_name: newMultiPOOrder.productName,
            total_sell_price: newMultiPOOrder.totalSellPrice,
            ship_by_date: order.shipByDate || null,
            asin: order.asin,
            sku: order.sku,
            s_qty: qtyToSource,
            b_qty: qtyToSource,
            po_id: newMultiPOOrder.poId,
            buy_link: null,
            is_dhl: order.isDHL,
            exception_reason: exceptionReason,
            exception_po_created: true,
            status: 'pending_source',
          }),
        });
        const data = await res.json();
        if (res.ok && data?.ok && data.order) {
          // Update local state with the real DB id
          setOrders?.(prev => prev.map(o => o.id === newMultiPOOrder.id ? {...o, id: data.order.id} : o));
        }
      } catch (err) {
        console.warn('Exception PO saved locally but DB sync failed:', err.message);
      }

      // Also create Multi-PO entry for Issues tab
      const exceptionMultiPO = {
        id: 'EXC-' + Date.now(),
        orderId: order.orderId,
        asin: order.asin,
        discrepancy: qtyToSource,
        alternativeSupplier: 'TBD - Sourcing Required',
        buyPrice: null,
        incVAT: false,
        notes: `Exception PO: ${exceptionReason}. Source ${qtyToSource} qty.`,
        status: 'pending',
        createdDate: new Date().toISOString(),
        createdBy: window.CURRENT_USER?.name || window.CURRENT_USER?.email || 'Unknown',
        isExceptionPO: true
      };

      onCreateMultiPO?.(exceptionMultiPO);

      // Mark original order as having exception PO
      onUpdate(order.id, {
        exceptionReason: exceptionReason,
        exceptionPOCreated: true,
        multiPO: true
      });
      syncCell(order.sheetRow, COL.exceptionReason, exceptionReason);
      syncCell(order.sheetRow, COL.exceptionPOCreated, 'TRUE');
    }

    setShowExceptionForm(false);
    setExceptionReason('');
    setPartialQtyToSource('');
  };

  const isMPOOrder = (orders && orders.filter(o=>o.orderId===order.orderId).length>1) || order.isExceptionPO;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={isMPOOrder?{background:'#f0f6ff',borderLeft:'4px solid #3b82f6'}:{}}>
        {/* Multi-PO banner */}
        {isMPOOrder&&<div style={{background:'linear-gradient(135deg,#3b82f6,#2563eb)',padding:'8px 24px',display:'flex',alignItems:'center',gap:8,borderRadius:'20px 20px 0 0'}}>
          <span style={{fontSize:14,fontWeight:700,color:'#fff',letterSpacing:'-0.01em'}}>Multi-PO Order</span>
          {order.isExceptionPO&&<span style={{fontSize:11,padding:'2px 8px',background:'rgba(255,255,255,0.2)',color:'#fff',borderRadius:10,fontWeight:600}}>Exception PO</span>}
          {order.exceptionReason&&<span style={{fontSize:11,color:'rgba(255,255,255,0.8)'}}>— {order.exceptionReason}</span>}
        </div>}
        {/* Header */}
        <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(0,0,0,0.06)',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:10}}>
              <StatusTag state={st}/>
              {order.isDHL&&<span className="dhl-badge">DHL</span>}
              {order.multiPO&&<span className="mpo-badge">MULTI-PO</span>}
              {isOverdue&&<span className="tag" style={{background:'#fff5f5',color:'#ff3b30',border:'none',fontWeight:600,fontSize:11}}>Overdue</span>}
              {order.refunded&&<span className="tag" style={{background:'#fff5f5',color:'#ff3b30',border:'none',fontWeight:600,fontSize:11}}>Refunded</span>}
            </div>
            <div style={{fontSize:12,fontFamily:'IBM Plex Mono',color:'#86868b',marginBottom:6}}>{order.orderId}</div>
            <div style={{fontSize:17,fontWeight:600,color:'#1d1d1f',lineHeight:1.4,maxWidth:550,marginBottom:8,letterSpacing:'-0.02em'}}>{order.productName||'—'}</div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <SupplierBadge buyLink={order.buyLink}/>
              {order.poId&&<span style={{fontFamily:'IBM Plex Mono',color:'#0071e3',fontSize:12}}>{order.poId}</span>}
              {order.purchasedBy&&<span style={{color:'#86868b',fontSize:12}}>{order.purchasedBy}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:'#f5f5f7',border:'none',color:'#86868b',borderRadius:50,width:32,height:32,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',transition:'background 0.2s'}}>✕</button>
        </div>

        <div style={{padding:'20px 24px',overflowY:'auto',maxHeight:'calc(92vh - 160px)'}}>
          {/* Quick Links */}
          <div style={{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}}>
            {ensureProtocol(order.amazonLink)?<a href={ensureProtocol(order.amazonLink)} target="_blank" rel="noopener noreferrer" style={{background:'#f5f5f7',color:'#1d1d1f',borderRadius:20,padding:'8px 16px',textDecoration:'none',fontSize:13,fontWeight:500,display:'flex',alignItems:'center',gap:6,transition:'background 0.2s',border:'none'}}>Seller Central</a>:null}
            {ensureProtocol(order.shipStationLink)?<a href={ensureProtocol(order.shipStationLink)} target="_blank" rel="noopener noreferrer" style={{background:'#f5f5f7',color:'#1d1d1f',borderRadius:20,padding:'8px 16px',textDecoration:'none',fontSize:13,fontWeight:500,display:'flex',alignItems:'center',gap:6,transition:'background 0.2s',border:'none'}}>ShipStation</a>:null}
            {order.asin&&<a href={`https://www.amazon.com/dp/${order.asin}`} target="_blank" rel="noopener noreferrer" style={{background:'#f5f5f7',color:'#1d1d1f',borderRadius:20,padding:'8px 16px',textDecoration:'none',fontSize:13,fontWeight:500,border:'none'}}>Amazon</a>}
            {ensureProtocol(order.buyLink)?<a href={ensureProtocol(order.buyLink)} target="_blank" rel="noopener noreferrer" style={{background:'#f5f5f7',color:sup.color,borderRadius:20,padding:'8px 16px',textDecoration:'none',fontSize:13,fontWeight:500,border:'none'}}>{sup.name}</a>:null}
          </div>

          {/* Editable Buy Link */}
          {ri.canEdit&&<div style={{marginBottom:16}}>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:1}}>
                <label style={{fontSize:12,color:'#86868b',fontWeight:500,marginBottom:6,display:'block'}}>Buy Link</label>
                <input className="input" value={order.buyLink||''} placeholder="Paste buy link…"
                  onChange={e=>onUpdate(order.id,{buyLink:e.target.value})}
                  style={{fontSize:13,fontFamily:'IBM Plex Mono',padding:'10px 14px'}}/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:12,color:'#86868b',fontWeight:500,marginBottom:6,display:'block'}}>SKU</label>
                <input className="input" value={order.sku||''} placeholder="SKU…"
                  onChange={e=>{
                    const newSku=e.target.value;
                    const newAsin=extractASIN(newSku);
                    const updates={sku:newSku};
                    if(newAsin) updates.asin=newAsin;
                    onUpdate(order.id,updates);
                  }}
                  style={{fontSize:13,fontFamily:'IBM Plex Mono',padding:'10px 14px'}}/>
              </div>
            </div>
          </div>}

          {/* DHL Alert */}
          {order.isDHL&&<div style={{background:'#fff8f0',borderRadius:14,padding:'14px 18px',marginBottom:18,display:'flex',gap:14,alignItems:'center'}}>
            <span style={{fontSize:24}}>🚚</span>
            <div>
              <div style={{color:'#1d1d1f',fontWeight:600,fontSize:14}}>Ship via DHL</div>
              <div style={{color:'#86868b',fontSize:13,marginTop:2}}>This order is flagged for DHL delivery.</div>
            </div>
          </div>}

          {/* ShipStation Helper */}
          <div style={{background:'#fffbeb',borderRadius:14,padding:18,marginBottom:18}}>
            <div style={{fontSize:14,fontWeight:600,color:'#1d1d1f',marginBottom:12}}>ShipStation Entry</div>
            <div className="grid3" style={{gap:10}}>
              {[
                ['Buy Price Excl. VAT', liveCalc?`£${liveCalc.totalBuyExcVAT.toFixed(2)}`:order.totalBuyPriceExcVAT!=null?`£${Number(order.totalBuyPriceExcVAT).toFixed(2)}`:'—','#1d1d1f'],
                ['B-Qty', editBQty||(order.bQty??'—'),'#1d1d1f'],
                ['HTS Code', order.htsCode||'—','#86868b'],
              ].map(([k,v,c])=>(
                <div key={k} onClick={()=>copy(v)} style={{background:'#fff',borderRadius:12,padding:'12px 14px',cursor:'copy',position:'relative',transition:'background 0.2s'}} title={`Click to copy: ${v}`}>
                  <div style={{fontSize:11,color:'#86868b',fontWeight:500,marginBottom:4}}>{k}</div>
                  <div style={{fontSize:22,fontWeight:700,color:c,fontFamily:'IBM Plex Mono',letterSpacing:'-0.02em'}}>{String(v)}</div>
                  <span style={{position:'absolute',top:8,right:10,fontSize:10,color:'#86868b',opacity:.4}}>copy</span>
                </div>
              ))}
            </div>
            <div style={{marginTop:8,fontSize:12,color:'#86868b'}}>HTS: {order.htsDesc} · Delivery: {order.expectedDeliveryDate||'TBC'} {order.expectedDeliveryTime||''}</div>
          </div>

          {/* Profitability Calculator */}
          <div style={{background:displayProfitable===true?'#f0fdf4':displayProfitable===false?'#fff5f5':'#f5f5f7',borderRadius:18,padding:'20px 22px',marginBottom:20,transition:'all .3s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:15,fontWeight:600,color:'#1d1d1f',letterSpacing:'-0.01em'}}>Profitability</div>
              {displayProfit!=null&&<div style={{display:'flex',gap:12,alignItems:'center'}}>
                <span style={{fontSize:28,fontWeight:700,fontFamily:'"SF Pro Display","Inter",system-ui',color:displayProfitable?'#34c759':'#ff3b30',letterSpacing:'-0.03em'}}>${displayProfit>=0?'+':''}{displayProfit.toFixed(2)}</span>
                {displayMargin!=null&&<span style={{fontSize:13,color:'#86868b',fontWeight:500}}>{displayMargin.toFixed(1)}%</span>}
              </div>}
            </div>

            {/* Editable sourcing inputs */}
            {ri.canEdit&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,marginBottom:16}}>
              <div>
                <label style={{fontSize:12,color:'#86868b',fontWeight:500,marginBottom:6,display:'block'}}>Unit Buy Price (£)</label>
                <input type="number" step="0.01" min="0" className="input" value={editUnitBuy} placeholder="0.00"
                  onChange={e=>{
                    setEditUnitBuy(e.target.value);
                    const v=e.target.value===''?null:parseFloat(e.target.value);
                    onUpdate(order.id,{unit_buy_price_inc_vat:v});
                  }}
                  style={{fontSize:15,fontFamily:'IBM Plex Mono',fontWeight:600,padding:'10px 14px'}}/>
              </div>
              <div>
                <label style={{fontSize:12,color:'#86868b',fontWeight:500,marginBottom:6,display:'block'}}>Delivery Fee (£)</label>
                <input type="number" step="0.01" min="0" className="input" value={editDelivFee} placeholder="0.00"
                  onChange={e=>{
                    setEditDelivFee(e.target.value);
                    const v=e.target.value===''?null:parseFloat(e.target.value);
                    onUpdate(order.id,{delivery_fee_per_line:v});

                ['Margin', displayMargin!=null?`${displayMargin.toFixed(1)}%`:'—', displayMargin!=null?(displayMargin>=0?'#34c759':'#ff3b30'):'#86868b'],

                <div style={{fontSize:15,fontWeight:600,fontFamily:'IBM Plex Mono',color:c,letterSpacing:'-0.02em'}}>{String(v)}</div>
              </div>)}
            </div>

            {/* Reference data hint */}
            {refData&&<div style={{marginTop:12,padding:'10px 14px',background:'rgba(255,255,255,0.7)',borderRadius:10,display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>

                  )}

                  <div style={{display:'flex',gap:10}}>

                        try {
                          setFulfillmentError('');
                          setFulfillmentLoading(true);
                          const res = await fetch('/api/shipstation/fulfill-order', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                              orderId: order.orderId,
                              weight: parseFloat(fulfillmentWeight),
                              buyPriceExVAT: order.totalBuyPriceExcVAT || 0

                          });

                          setLabelData(data);
                        } catch(e) {
                          setFulfillmentError(e.message);

                          setFulfillmentLoading(false);
                        }
                      }}>
                      {fulfillmentLoading?'Creating...':'🚚 Create Shipment & Print Label'}
                    </button>
                    <button style={{flex:1,background:'#e8e8ed',border:'1px solid #d2d2d7',color:'#86868b',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:700,cursor:'pointer'}}
                      onClick={()=>{setShowFulfillmentForm(false);setFulfillmentError('');setFulfillmentWeight('');}}>
                      Cancel
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>}
      </div>
    </div>
  );
}

/* ═══ OWNER ANALYTICS DASHBOARD ═══ */
function OwnerDashboard({orders}) {
  const stats = useMemo(()=>{
    try {
      console.log(`📊 Computing dashboard stats for ${orders.length} orders...`);
      
      const shipped = orders.filter(o=>o.labelPrinted);
      
      // Revenue: sum totalSellPrice from all orders
      const totalRev = orders.reduce((sum, o) => {
        const price = o.totalSellPrice;
        const numeric = price != null ? parseFloat(price) : 0;
        return sum + (isNaN(numeric) ? 0 : numeric);
      }, 0);
      
      // Buy cost: sum totalBuyPriceIncVAT from all orders
      const totalCost = orders.reduce((sum, o) => {
        const cost = o.totalBuyPriceIncVAT;
        const numeric = cost != null ? parseFloat(cost) : 0;
        return sum + (isNaN(numeric) ? 0 : numeric);
      }, 0);
      
      // Profit: sum expectedProfit from all orders
      const totalProfit = orders.reduce((sum, o) => {
        const profit = o.expectedProfit;
        const numeric = profit != null ? parseFloat(profit) : 0;
        return sum + (isNaN(numeric) ? 0 : numeric);
      }, 0);
      
      // Shipping: sum shippingCostGBP from all orders
      const totalShipCost = orders.reduce((sum, o) => {
        const ship = o.shippingCostGBP;
        const numeric = ship != null ? parseFloat(ship) : 0;
        return sum + (isNaN(numeric) ? 0 : numeric);
      }, 0);
      
      const marginPct = totalRev > 0 ? (totalProfit/totalRev)*100 : 0;
      const dhlOrders = orders.filter(o=>o.isDHL && Number(o.totalSellPrice||0) >= 300);
      const exceptions = orders.filter(o=>o.discrepancy!=null&&Number(o.discrepancy)!==0);
      const refunded = orders.filter(o=>o.refunded);

      // By importer
      const byImporter={};
      orders.forEach(o=>{
        const k=o.purchasedBy||'Unknown';
        if(!byImporter[k]) byImporter[k]={count:0,profit:0,rev:0};
        byImporter[k].count++;
        const profitVal = o.expectedProfit != null ? parseFloat(o.expectedProfit) : 0;
        const revVal = o.totalSellPrice != null ? parseFloat(o.totalSellPrice) : 0;
        byImporter[k].profit += (isNaN(profitVal) ? 0 : profitVal);
        byImporter[k].rev += (isNaN(revVal) ? 0 : revVal);
      });
      const importerList = Object.entries(byImporter)
        .filter(([k])=>!['In Stock @ Bletchley','Order Cancellation Flow','Ordered for INS'].includes(k))
        .sort((a,b)=>b[1].count-a[1].count);

      // By supplier
      const bySupplier={};
      orders.forEach(o=>{
        const s=getSupplier(o.buyLink);
        if(!bySupplier[s.name]) bySupplier[s.name]={count:0,color:s.color};
        bySupplier[s.name].count++;
      });
      const supplierList = Object.entries(bySupplier).sort((a,b)=>b[1].count-a[1].count);

      const result = {
        totalOrders:orders.length,
        shipped:shipped.length,
        totalRev,
        totalCost,
        totalProfit,
        totalShipCost,
        marginPct,
        dhlOrders,
        exceptions,
        refunded,
        importerList,
        supplierList,
      };
      
      console.log('✓ Dashboard stats computed:', {
        totalOrders: result.totalOrders,
        totalRev: result.totalRev.toFixed(2),
        totalCost: result.totalCost.toFixed(2),
        totalProfit: result.totalProfit.toFixed(2),
        marginPct: result.marginPct.toFixed(1),
        shipped: result.shipped,
        dhlCount: result.dhlOrders.length,
        exceptionCount: result.exceptions.length,
      });
      
      return result;
    } catch (err) {
      console.error('❌ Dashboard stats error:', err);
      return {
        totalOrders:orders.length||0,
        shipped:0,
        totalRev:0,
        totalCost:0,
        totalProfit:0,
        totalShipCost:0,
        marginPct:0,
        dhlOrders:[],
        exceptions:[],
        refunded:[],
        importerList:[],
        supplierList:[],
      };
    }
  },[orders]);

  const maxImporterCount = stats.importerList[0]?.[1]?.count||1;
  const maxSupplierCount = stats.supplierList[0]?.[1]?.count||1;

  return (
    <div style={{padding:'20px 24px',overflowY:'auto',height:'calc(100vh - 52px)'}}>
      <div style={{fontSize:15,color:'#1d1d1f',marginBottom:18,letterSpacing:'-0.01em',fontWeight:600}}>Owner Analytics <span style={{color:'#86868b',fontWeight:400,fontSize:13}}>· {stats.totalOrders} orders</span></div>

      {/* Top KPIs */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:24}}>
        {[
          {l:'Total Revenue',v:`$${(stats.totalRev||0).toFixed(0)}`,c:'#34c759',sub:'Sell prices (USD)'},
          {l:'Total Buy Cost',v:`£${(stats.totalCost||0).toFixed(0)}`,c:'#ff3b30',sub:'incl. VAT (GBP)'},
          {l:'Total Profit',v:`$${(stats.totalProfit||0).toFixed(0)}`,c:(stats.totalProfit||0)>=0?'#34c759':'#ff3b30',sub:'Expected'},
          {l:'Profit Margin',v:`${(stats.marginPct||0).toFixed(1)}%`,c:(stats.marginPct||0)>20?'#34c759':(stats.marginPct||0)>0?'#ff9f0a':'#ff3b30',sub:'Revenue %'},
          {l:'Shipping Cost',v:`£${(stats.totalShipCost||0).toFixed(0)}`,c:'#ff9f0a',sub:'GBP total'},
          {l:'Shipped',v:stats.shipped||0,c:'#34c759',sub:`of ${stats.totalOrders||0}`},
          {l:'DHL Orders',v:(stats.dhlOrders||[]).length,c:'#ff9f0a',sub:'≥$300 value'},
          {l:'Exceptions',v:(stats.exceptions||[]).length,c:(stats.exceptions||[]).length?'#ff3b30':'#34c759',sub:'Discrepancy'},
          {l:'Refunded',v:(stats.refunded||[]).length,c:(stats.refunded||[]).length?'#ff3b30':'#34c759',sub:'Orders'},
        ].map(({l,v,c,sub})=>(
          <div key={l} className="stat-card">
            <div className="stat-label">{l}</div>
            <div className="stat-value" style={{color:c}}>{v}</div>
            <div style={{fontSize:11,color:'#86868b',marginTop:4}}>{sub}</div>
          </div>

      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
        {/* By Importer */}
        <div className="card" style={{padding:24}}>
          <div style={{fontSize:15,fontWeight:600,color:'#1d1d1f',marginBottom:16,letterSpacing:'-0.01em'}}>Orders by Importer</div>
          {(stats.importerList||[]).slice(0,8).map(([name,data])=>(
            <div key={name} className="bar-row">
              <div style={{width:90,color:'#86868b',fontSize:12,textAlign:'right',paddingRight:8,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{name.split(' ')[0]}</div>
              <div className="bar-track">

/* ═══ AUDIT LOG VIEW ═══ */
function AuditLogView() {
  const [logs, setLogs] = React.useState([]);
  const [filter, setFilter] = React.useState({field: '', user: '', startDate: '', endDate: ''});
  const [selectedOrderId, setSelectedOrderId] = React.useState('');

  React.useEffect(() => {
    const allLogs = getAllAuditLogs();
    setLogs(allLogs);
    
    // Poll for new audit logs every 2 seconds to see live updates
    const pollInterval = setInterval(() => {
      const updatedLogs = getAllAuditLogs();
      setLogs(updatedLogs);
    }, 2000);
    
    return () => clearInterval(pollInterval);
  }, []);

  const filteredLogs = React.useMemo(() => {
    let result = logs;
    
    if (filter.field) result = result.filter(l => l.field === filter.field);
    if (filter.user) result = result.filter(l => l.user.toLowerCase().includes(filter.user.toLowerCase()));
    if (filter.startDate) result = result.filter(l => new Date(l.timestamp) >= new Date(filter.startDate));
    if (filter.endDate) {
      const endDate = new Date(filter.endDate);
      endDate.setHours(23, 59, 59, 999);
      result = result.filter(l => new Date(l.timestamp) <= endDate);
    }
    if (selectedOrderId) result = result.filter(l => l.orderId === selectedOrderId);
    
    return result;
  }, [logs, filter, selectedOrderId]);

  const exportLogs = () => {
    const csv = [
      ['Timestamp', 'User', 'Role', 'Order ID', 'Field', 'Old Value', 'New Value', 'Details'].join(','),
      ...filteredLogs.map(l => [
        l.timestamp,
        l.user,
        l.role,
        l.orderId,
        l.field,
        String(l.oldValue).replace(/,/g, ';'),
        String(l.newValue).replace(/,/g, ';'),
        (l.details || '').replace(/,/g, ';')
      ].map(v => `"${v}"`).join(','))
    ].join('\n');
    
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `audit-log-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return (
    <div style={{padding:'20px 24px', overflowY:'auto', height:'calc(100vh - 52px)', background:'#f5f5f7'}}>
      <div style={{fontSize:15, color:'#1d1d1f', marginBottom:18, letterSpacing:'-0.01em', fontWeight:600}}>Audit Log</div>

      {/* Filters */}
      <div style={{marginBottom:20, display:'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap:12}}>
        <div>
          <label style={{fontSize:11, color:'#86868b', display:'block', marginBottom:6, fontWeight:500}}>Field Changed</label>
          <select value={filter.field} onChange={e => setFilter({...filter, field: e.target.value})}
            className="input" style={{padding:'10px 12px', fontSize:13}}>
            <option value=''>All Fields</option>
            <option value='labelPrinted'>Label Printed</option>
            <option value='qtyReceived'>Qty Received</option>
            <option value='exceptionReason'>Exception Reason</option>
          </select>
        </div>

        <div>
          <label style={{fontSize:11, color:'#86868b', display:'block', marginBottom:6, fontWeight:500}}>User</label>
          <input type="text" placeholder="Search by name" value={filter.user} onChange={e => setFilter({...filter, user: e.target.value})}
            className="input" style={{padding:'10px 12px', fontSize:13}}/>
        </div>

        <div>
          <label style={{fontSize:11, color:'#86868b', display:'block', marginBottom:6, fontWeight:500}}>Start Date</label>
          <input type="date" value={filter.startDate} onChange={e => setFilter({...filter, startDate: e.target.value})}
            className="input" style={{padding:'10px 12px', fontSize:13}}/>
        </div>

        <div>
          <label style={{fontSize:11, color:'#86868b', display:'block', marginBottom:6, fontWeight:500}}>End Date</label>
          <input type="date" value={filter.endDate} onChange={e => setFilter({...filter, endDate: e.target.value})}
            className="input" style={{padding:'10px 12px', fontSize:13}}/>
        </div>

        <div style={{display:'flex', gap:8, alignItems:'flex-end'}}>
          <button onClick={() => setFilter({field: '', user: '', startDate: '', endDate: ''})} style={{flex:1, background:'#f5f5f7', border:'none', borderRadius:20, color:'#86868b', padding:'10px', cursor:'pointer', fontSize:12, fontWeight:600}}>
            Clear
          </button>
          <button onClick={exportLogs} style={{flex:1, background:'#0071e3', border:'none', borderRadius:20, color:'#fff', padding:'10px', cursor:'pointer', fontSize:12, fontWeight:600}}>
            Export CSV
          </button>
        </div>
      </div>

      {/* Log Table */}
      <div className="card" style={{overflow:'hidden', marginBottom:20, padding:0}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:11}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(0,0,0,0.08)'}}>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>Timestamp</th>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>User</th>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>Order ID</th>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>Field</th>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>Old → New Value</th>
                <th style={{padding:'10px 14px', textAlign:'left', color:'#86868b', fontWeight:600, fontSize:11, background:'transparent'}}>Details</th>
              </tr>
            </thead>
            <tbody>
              {filteredLogs.length > 0 ? (
                filteredLogs.map((log, idx) => (
                  <tr key={idx} style={{borderBottom:'1px solid rgba(0,0,0,0.04)'}}>
                    <td style={{padding:'10px 14px', color:'#86868b', whiteSpace:'nowrap', fontSize:12}}>{new Date(log.timestamp).toLocaleString()}</td>
                    <td style={{padding:'10px 14px', color:'#0071e3', fontWeight:600, fontSize:12}}>{log.user}</td>
                    <td style={{padding:'10px 14px', color:'#86868b', fontFamily:'IBM Plex Mono', fontSize:11, cursor:'pointer'}} onClick={() => setSelectedOrderId(log.orderId)} title="Click to filter">…{(log.orderId || '').slice(-10)}</td>
                    <td style={{padding:'10px 14px', color:'#1d1d1f', fontWeight:600, fontSize:12}}>{log.field}</td>
                    <td style={{padding:'10px 14px', color:'#1d1d1f', fontFamily:'IBM Plex Mono', fontSize:11, maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      <span style={{color:'#ff3b30'}}>{String(log.oldValue).substring(0, 15)}</span> → <span style={{color:'#34c759'}}>{String(log.newValue).substring(0, 15)}</span>
                    </td>
                    <td style={{padding:'10px 14px', color:'#86868b', fontSize:11}}>{log.details || '—'}</td>
                  </tr>
                ))
              ) : (
                <tr>
                  <td colSpan="6" style={{padding:'20px', textAlign:'center', color:'#6e6e73', fontStyle:'italic'}}>No audit logs found</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{fontSize:12, color:'#86868b', padding:14, background:'#fff', borderRadius:14, border:'none'}}>
        <strong>{filteredLogs.length}</strong> changes logged {selectedOrderId ? `for order ${selectedOrderId}` : 'total'}
      </div>
    </div>
  );
}
