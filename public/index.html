/* ═══ OPERATIONS TABLE ═══ */
function OperationsTable({orders,setOrders,role,syncCell,createMultiPO,getCombinedDiscrepancy,onImportOrders,onBulkImportCsv,onDeleteOrders}) {
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(0);
  const [pageSize,setPageSize]=useState(100);
  const [selected,setSelected]=useState(null);
  const [supplierFilter,setSupplierFilter]=useState('');
  const [deliveryDateFilter,setDeliveryDateFilter]=useState('');
  const [showSingleImport,setShowSingleImport]=useState(false);
  const [showBulkImport,setShowBulkImport]=useState(false);
  const [bulkMode,setBulkMode]=useState('shipstation');
  const [bulkCsvText,setBulkCsvText]=useState('');
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [deleting,setDeleting]=useState(false);
  const [singleImport,setSingleImport]=useState({
    orderId:'', sku:'', qty:'1', productName:'', carrier:'', orderDate:'', shipByDate:'', totalSellPrice:'', buyLink:'', poId:''
  });
  const ri=ROLES[role];

  const updateOrder=useCallback((id,patch)=>{
    setOrders(prev=>prev.map(o=>o.id===id?{...o,...patch}:o));
    setSelected(prev=>prev&&prev.id===id?{...prev,...patch}:prev);
  },[]);

  const multiPOSet=useMemo(()=>{
    const counts={};
    orders.forEach(o=>{if(o.orderId){counts[o.orderId]=(counts[o.orderId]||0)+1;}});
    return new Set(Object.keys(counts).filter(id=>counts[id]>1));
  },[orders]);

  // Group multi-PO orders together, rest by sheetRow descending
  const sortedOrders=useMemo(()=>{
    const groups={};
    const singles=[];
    orders.forEach(o=>{
      const isMPO=o.orderId&&multiPOSet.has(o.orderId);
      if(isMPO){
        if(!groups[o.orderId]) groups[o.orderId]=[];
        groups[o.orderId].push(o);
      } else {
        singles.push(o);
      }
    });
    singles.sort((a,b)=>(b.sheetRow||0)-(a.sheetRow||0));
    const mpoGroups=Object.values(groups).sort((a,b)=>(b[0].sheetRow||0)-(a[0].sheetRow||0));
    const result=[];
    // Interleave: place each MPO group at its position
    const allItems=[...singles.map(o=>({type:'single',o})),...mpoGroups.map(g=>({type:'group',g}))];
    allItems.sort((a,b)=>{
      const aRow=a.type==='single'?a.o.sheetRow:a.g[0].sheetRow;
      const bRow=b.type==='single'?b.o.sheetRow:b.g[0].sheetRow;
      return bRow-aRow;
    });
    allItems.forEach(item=>{
      if(item.type==='single') result.push(item.o);
      else result.push(...item.g);
    });
    return result;
  },[orders,multiPOSet]);

  const filtered=useMemo(()=>{
    let list=sortedOrders;
    
    // Apply status filter
    if(filter==='shipped') list=list.filter(o=>o.labelPrinted);
    else if(filter==='exceptions') list=list.filter(o=>!o.labelPrinted&&((o.discrepancy!=null&&Number(o.discrepancy)!==0)||o.exceptionReason||o.goodsNotAvailable));
    else if(filter==='ready') list=list.filter(o=>rowState(o)==='ready');
    else if(filter==='pending') list=list.filter(o=>rowState(o)==='pending');
    else if(filter==='editing') list=list.filter(o=>o.beingEdited);
    else if(filter==='dhl') list=list.filter(o=>o.isDHL);
    else if(filter==='mpo') list=list.filter(o=>o.multiPO);
    // 'all' has no additional filter
    
    // Apply supplier filter
    if(supplierFilter && supplierFilter.trim()){
      const supplierName = supplierFilter.toLowerCase();
      list=list.filter(o=>{
        const detected = getSupplier(o.buyLink);
        return (detected.name && detected.name.toLowerCase().includes(supplierName)) || 
               (detected.shortName && detected.shortName.toLowerCase().includes(supplierName));
      });
    }
    
    // Apply delivery date filter
    if(deliveryDateFilter && deliveryDateFilter.trim()){
      const filterDate = new Date(deliveryDateFilter).toDateString();
      list=list.filter(o=>{
        if(!o.expectedDeliveryDate) return false;
        const orderDate = new Date(o.expectedDeliveryDate).toDateString();
        return orderDate === filterDate;
      });
    }
    
    // Apply search filter
    if(search && search.trim()){
      const q=search.toLowerCase();
      list=list.filter(o=>(
        (o.orderId && o.orderId.toLowerCase().includes(q)) ||
        (o.productName && o.productName.toLowerCase().includes(q)) ||
        (o.asin && o.asin.toLowerCase().includes(q)) ||
        (o.sku && o.sku.toLowerCase().includes(q)) ||
        (o.poId && o.poId.toLowerCase().includes(q)) ||
        (o.purchasedBy && o.purchasedBy.toLowerCase().includes(q)) ||
        (o.htsCode && o.htsCode.includes(q))
      ));
    }
    
    console.log(`✓ Filter: ${filter}, Search: ${search}, Results: ${list.length}/${sortedOrders.length}`);
    return list;
  },[sortedOrders,filter,search,supplierFilter,deliveryDateFilter]);

  // Pagination (reset page when filter/search/pageSize changes)
  useEffect(()=>{ setPage(0); },[filtered, pageSize]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / (pageSize || 1)));
  const startIndex = filtered.length===0 ? 0 : page * pageSize;
  const endIndex = Math.min(filtered.length, (page + 1) * pageSize);
  const paged = filtered.slice(startIndex, endIndex);

  const stats=useMemo(()=>{
    const result = {
      total:orders.length,
      shipped:orders.filter(o=>o.labelPrinted).length,
      exceptions:orders.filter(o=>!o.labelPrinted&&((o.discrepancy!=null&&Number(o.discrepancy)!==0)||o.exceptionReason||o.goodsNotAvailable)).length,
      ready:orders.filter(o=>rowState(o)==='ready').length,
      editing:orders.filter(o=>o.beingEdited).length,
      dhl:orders.filter(o=>o.isDHL).length,
      overdue:orders.filter(o=>{if(o.labelPrinted||!o.shipByDate)return false;const d=parseShipDate(o.shipByDate);return d&&!isNaN(d)&&d<new Date();}).length,
    };
    console.log('📊 Operations table stats:', result);
    return result;
  },[orders]);

  const FILTERS=[
    {k:'all',l:`All (${stats.total||0})`},
    {k:'ready',l:`Pack Now (${stats.ready||0})`,c:'#f97316'},
    {k:'editing',l:`Importing (${stats.editing||0})`,c:'#10b981'},
    {k:'exceptions',l:`Exceptions (${stats.exceptions||0})`,c:'#ef4444'},
    {k:'shipped',l:`Shipped (${stats.shipped||0})`,c:'#22c55e'},
    {k:'dhl',l:`DHL (${stats.dhl||0})`,c:'#fb923c'},
    {k:'pending',l:'Pending'},
    {k:'mpo',l:'Multi-PO'},
  ];

  // Columns by role
  const canDelete = ri.canImport; // owner + importer
  const packerCols=['status','orderId','product','supplier','shipBy','sQty','bQty','weight','hts','qtyRcvd','disc','label','links'];
  const importerCols=[...(canDelete?['select']:[]),'status','orderId','product','supplier','shipBy','poId','sQty','bQty','weight','buyExcVAT','hts','qtyRcvd','disc','label','lock','links'];
  const cols=ri.seesAll?importerCols:packerCols;

  const COL_W={select:36,status:110,orderId:150,product:210,supplier:90,shipBy:88,poId:75,sQty:45,bQty:45,weight:60,buyExcVAT:95,hts:100,profit:78,qtyRcvd:62,disc:48,label:56,lock:48,links:80};
  const COL_H={select:'',status:'Status',orderId:'Order ID',product:'Product',supplier:'Seller / Basket',shipBy:'Ship By',poId:'PO ID',sQty:'S-Qty',bQty:'B-Qty',weight:'Weight (kg)',buyExcVAT:'Buy Excl. VAT',hts:'HTS Code',profit:'Profit',qtyRcvd:'Rcvd',disc:'Disc.',label:'Label',lock:'Lock',links:'Links'};

  function renderCell(col, order) {
    const isOverdue=!order.labelPrinted&&order.shipByDate&&new Date(order.shipByDate)<new Date();
    const isMPO=multiPOSet.has(order.orderId)&&order.orderId;
    switch(col) {
      case 'select': return <input type="checkbox" checked={selectedIds.has(order.id)} onChange={e=>{e.stopPropagation();setSelectedIds(prev=>{const n=new Set(prev);if(n.has(order.id))n.delete(order.id);else n.add(order.id);return n;});}} onClick={e=>e.stopPropagation()} style={{width:16,height:16,cursor:'pointer',accentColor:'#0071e3'}}/>;
      case 'status': return <StatusTag state={rowState(order)} small/>;
      case 'orderId': return <div style={{maxWidth:COL_W.orderId-24,overflow:'hidden'}}>
        <div style={{fontFamily:'IBM Plex Mono',color:isMPO?'#0071e3':'#86868b',fontSize:10,fontWeight:isMPO?700:400,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={order.orderId}>…{(order.orderId||'').slice(-14)}</div>
        <div style={{display:'flex',gap:3,marginTop:2,flexWrap:'wrap'}}>
          {isMPO&&<span style={{fontSize:7,padding:'1px 5px',background:'rgba(96,165,250,0.12)',color:'#3b82f6',border:'1px solid rgba(96,165,250,0.3)',borderRadius:3,fontWeight:700,letterSpacing:'0.02em'}}>MULTI-PO</span>}
          {order.isExceptionPO&&<span style={{fontSize:7,padding:'1px 5px',background:'rgba(96,165,250,0.12)',color:'#3b82f6',border:'1px solid rgba(96,165,250,0.3)',borderRadius:3,fontWeight:700,letterSpacing:'0.02em'}}>EXCEPTION</span>}
          {order.isDHL&&<span className="dhl-badge" style={{fontSize:8,padding:'1px 5px'}}>DHL</span>}
        </div>
      </div>;
      case 'product': return <div style={{maxWidth:210}}>
        <div style={{color:'#1d1d1f',fontSize:11,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={order.productName}>{order.productName||'—'}</div>
        <div style={{color:'#86868b',fontSize:9,fontFamily:'IBM Plex Mono',marginTop:1}}>{order.asin}</div>
      </div>;
      case 'supplier': {
        const sName = order.sellerName || getSupplierName(order.buyLink);
        const sup2 = getSupplier(order.buyLink);
        return <span style={{display:'flex',flexDirection:'column',gap:2}}>
          <span className="sup-badge" style={{background:sup2.bg,color:sup2.color,border:`1px solid ${sup2.color}35`,fontSize:8,whiteSpace:'nowrap'}}>{sup2.emoji} {sName||sup2.name}</span>
          {sName&&sName!=='Other'&&<span style={{fontSize:8,color:'#7dd3fc',background:'rgba(125,211,252,0.08)',border:'1px solid rgba(125,211,252,0.2)',borderRadius:3,padding:'1px 5px',whiteSpace:'nowrap'}}>{sName} Basket</span>}
        </span>;
      }
      case 'shipBy': return <span style={{fontFamily:'IBM Plex Mono',fontSize:10,color:isOverdue?'#ef4444':'#86868b',fontWeight:isOverdue?700:400}}>{formatDateVal(order.shipByDate)}{isOverdue?' ⚠':''}</span>;
      case 'poId': return <input type="text" value={order.poId||''} onClick={e=>e.stopPropagation()}
          onChange={e=>{e.stopPropagation();const v=e.target.value||null;updateOrder(order.id,{poId:v});}}
          onBlur={e=>{const v=e.target.value||null;const userEmail=window.CURRENT_USER?.email||'unknown';fetch(API.updateOrder(order.id),{method:'POST',headers:{'Content-Type':'application/json','x-user-email':userEmail},body:JSON.stringify({po_id:v})}).catch(console.error);}}
          style={{width:65,background:'#f5f5f7',border:'1px solid #d2d2d7',borderRadius:5,color:order.poId?'#0071e3':'#86868b',textAlign:'center',padding:'4px',fontSize:10,fontFamily:'IBM Plex Mono'}}
          placeholder="PO ID"/>;
      case 'sQty': return <span style={{fontFamily:'IBM Plex Mono',color:'#86868b',fontSize:11,textAlign:'center',display:'block'}}>{order.sQty??'—'}</span>;
      case 'bQty': return <span style={{fontFamily:'IBM Plex Mono',color:'#86868b',fontSize:11,textAlign:'center',display:'block'}}>{order.bQty??'—'}</span>;
      case 'weight': return <div style={{display:'flex',flexDirection:'column',gap:1,alignItems:'center'}}>
        <input type="number" step="0.01" min="0" value={order.weight??''} onClick={e=>e.stopPropagation()}
          onChange={e=>{e.stopPropagation();const v=e.target.value===''?null:Number(e.target.value);updateOrder(order.id,{weight:v});syncCell(order.sheetRow,COL.weight,v===null?'':v);}}
          style={{width:55,background:'#f5f5f7',border:'1px solid #d2d2d7',borderRadius:5,color:order.weight!=null?'#0071e3':'#86868b',textAlign:'center',padding:'4px',fontSize:11,fontFamily:'IBM Plex Mono'}}
          placeholder="kg"/>
        {order.suggestedWeight!=null&&<div style={{fontSize:7,color:'#86868b',whiteSpace:'nowrap'}} title="Suggested weight from sheet">~{Number(order.suggestedWeight).toFixed(2)}kg</div>}
      </div>;
      case 'buyExcVAT': return <span style={{fontFamily:'IBM Plex Mono',color:'#fbbf24',fontWeight:700,fontSize:11}}>{order.totalBuyPriceExcVAT!=null?`£${Number(order.totalBuyPriceExcVAT).toFixed(2)}`:'—'}</span>;
      case 'hts': return <span style={{fontFamily:'IBM Plex Mono',color:'#a78bfa',fontSize:9}}>{order.htsCode||'—'}</span>;
      case 'profit': return <span style={{fontFamily:'IBM Plex Mono',fontSize:11,color:order.expectedProfit!=null?(Number(order.expectedProfit)>=0?'#22c55e':'#ef4444'):'#86868b'}}>{order.expectedProfit!=null?`$${Number(order.expectedProfit).toFixed(2)}`:'—'}</span>;
      case 'qtyRcvd': return <input type="number" min="0" value={order.qtyReceived??''} onClick={e=>e.stopPropagation()}

        style={{width:50,background:'#f5f5f7',border:'1px solid #d2d2d7',borderRadius:5,color:order.qtyReceived!=null&&order.bQty!=null&&Number(order.qtyReceived)!==Number(order.bQty)?'#ef4444':'#22c55e',textAlign:'center',padding:'4px',fontSize:11,fontFamily:'IBM Plex Mono'}}/>;
      case 'disc': return <span style={{fontFamily:'IBM Plex Mono',color:Number(order.discrepancy)!==0?'#ef4444':'#86868b',fontWeight:Number(order.discrepancy)!==0?800:400,fontSize:11}}>{Number(order.discrepancy)!==0?order.discrepancy:'—'}</span>;
      case 'label': return <button onClick={e=>{e.stopPropagation();const v=!order.labelPrinted;updateOrder(order.id,{labelPrinted:v});syncCell(order.sheetRow,COL.labelPrinted,v?'TRUE':'FALSE');logChange(order.orderId,'labelPrinted',!v,v,'From table view');}}
        style={{background:order.labelPrinted?'rgba(34,197,94,0.18)':'#f5f5f7',border:`1px solid ${order.labelPrinted?'#22c55e40':'#d2d2d7'}`,color:order.labelPrinted?'#22c55e':'#6e6e73',borderRadius:6,padding:'3px 9px',cursor:'pointer',fontSize:13,fontWeight:700}}>
        {order.labelPrinted?'✓':'○'}
      </button>;
      case 'lock': return ri.canLock?<button onClick={e=>{e.stopPropagation();const lockUrl=order.beingEdited?API.unlockOrder(order.id):API.lockOrder(order.id);const userEmail=window.CURRENT_USER?.email||'unknown';fetch(lockUrl,{method:'POST',headers:{'Content-Type':'application/json','x-user-email':userEmail},body:JSON.stringify({userEmail})}).then(r=>r.json()).then(data=>{updateOrder(order.id,{beingEdited:!!data?.order?.locked_by});}).catch(console.error);}}
        style={{background:order.beingEdited?'rgba(16,185,129,0.18)':'#f5f5f7',border:`1px solid ${order.beingEdited?'#10b98140':'#d2d2d7'}`,color:order.beingEdited?'#10b981':'#6e6e73',borderRadius:6,padding:'3px 8px',cursor:'pointer',fontSize:11,fontWeight:700}}>
        {order.beingEdited?'🔒':'✏'}
      </button>:<span style={{color:'#c7c7cc',fontSize:10}}>—</span>;
      case 'links': return <div style={{display:'flex',gap:4}}>
        {order.asin&&<a href={`https://www.amazon.com/dp/${order.asin}`} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Amazon Listing" style={{background:'rgba(148,163,184,0.1)',border:'1px solid rgba(148,163,184,0.25)',color:'#86868b',borderRadius:4,padding:'3px 6px',textDecoration:'none',fontSize:10,fontWeight:700}}>ASIN</a>}
        {order.buyLink&&<a href={order.buyLink} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Buy link" style={{background:'rgba(167,139,250,0.1)',border:'1px solid rgba(167,139,250,0.25)',color:'#a78bfa',borderRadius:4,padding:'3px 6px',textDecoration:'none',fontSize:10,fontWeight:700}}>BUY</a>}
      </div>;
      default: return null;
    }
  }

  async function submitSingleImport() {
    if (!singleImport.orderId.trim()) {
      alert('Order Number is required');
      return;
    }
    try {
      const base = window.API_BASE || '';
      const userEmail = window.CURRENT_USER?.email || 'unknown';
      const res = await fetch(`${base}/api/shipstation/import-single`, {
        method:'POST',
        headers:{'Content-Type':'application/json','x-user-email':userEmail},
        body: JSON.stringify({ ...singleImport, importedBy: userEmail }),
      });
      const data = await res.json();
      if (!res.ok || !data?.ok) throw new Error(data?.error || `HTTP ${res.status}`);

      setShowSingleImport(false);
      setSingleImport({orderId:'', sku:'', qty:'1', productName:'', carrier:'', orderDate:'', shipByDate:'', totalSellPrice:'', buyLink:'', poId:''});
      if (onImportOrders) await onImportOrders();
    } catch (err) {
      console.error('Single import failed:', err);
      alert(`Single import failed: ${err.message}`);
    }
  }

  async function submitBulkImport() {
    if (!bulkCsvText.trim()) {
      alert('Paste CSV content first');
      return;
    }
    try {
      if (onBulkImportCsv) {
        await onBulkImportCsv(bulkCsvText, 'Pasted CSV', bulkMode);
      }
      setShowBulkImport(false);
      setBulkCsvText('');
    } catch (err) {
      console.error('Bulk import submit error:', err);
      alert(`Bulk import failed: ${err.message}`);
    }
  }

  async function handleBulkDelete() {
    if (selectedIds.size === 0) return;
    if (!confirm(`Delete ${selectedIds.size} order${selectedIds.size>1?'s':''}? This cannot be undone.`)) return;
    setDeleting(true);
    try {
      if (onDeleteOrders) await onDeleteOrders([...selectedIds]);
      setSelectedIds(new Set());
    } catch (err) {
      alert(`Delete failed: ${err.message}`);
    }
    setDeleting(false);
  }

  const toggleSelectAll = () => {
    if (selectedIds.size === paged.length) {
      setSelectedIds(new Set());

      setSelectedIds(new Set(paged.map(o => o.id)));
    }
  };

  const toggleSelectFiltered = () => {
    if (selectedIds.size === filtered.length) {
      setSelectedIds(new Set());

      setSelectedIds(new Set(filtered.map(o => o.id)));
    }
  };

  return (

        <div><div style={{fontSize:10,color:'#86868b',fontWeight:500}}>Shipped</div><div style={{fontSize:14,fontWeight:700,color:'#34c759'}}>{stats.shipped}</div></div>
        <div><div style={{fontSize:10,color:'#86868b',fontWeight:500}}>DHL</div><div style={{fontSize:14,fontWeight:700,color:'#ff9f0a'}}>{stats.dhl}</div></div>
        <div><div style={{fontSize:10,color:'#86868b',fontWeight:500}}>Exceptions</div><div style={{fontSize:14,fontWeight:700,color:'#ff3b30'}}>{stats.exceptions}</div></div>
      </div>

      {/* Filter bar - search, supplier, date on left; import buttons on right */}
      <div role="filterbar" style={{display:'flex',gap:8,padding:'6px 16px',background:'#fff',borderBottom:'1px solid rgba(0,0,0,0.06)',alignItems:'center',flexWrap:'nowrap',overflow:'auto'}}>

        <select value={supplierFilter} onChange={e=>setSupplierFilter(e.target.value)} className="input" style={{flex:'0 1 120px',minWidth:80,padding:'5px 8px',fontSize:'11px',height:28}}>

          {[...new Set(orders.filter(o=>o.buyLink).map(o=>getSupplier(o.buyLink).name))].sort().map(s=>(
            <option key={s} value={s}>{s.substring(0,20)}</option>

        <input type="date" value={deliveryDateFilter} onChange={e=>setDeliveryDateFilter(e.target.value)} className="input" style={{flex:'0 1 120px',minWidth:80,padding:'5px 8px',fontSize:'11px',height:28}}/>

          </div>
          <div style={{padding:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[
              ['Order Number','orderId'],['SKU','sku'],['Quantity','qty'],['Product Name','productName'],
              ['Carrier','carrier'],['Order Date','orderDate'],['Ship By Date','shipByDate'],['Total Price','totalSellPrice'],

            <button style={{background:'#0071e3',border:'none',color:'#fff',borderRadius:20,padding:'10px 24px',fontSize:14,fontWeight:600,cursor:'pointer',transition:'all 0.2s',letterSpacing:'-0.01em'}} onClick={submitSingleImport}>Import + Lock</button>

      {showBulkImport&&<div className="modal-overlay" onClick={()=>setShowBulkImport(false)}>

/* ═══ MULTI PO MODAL ═══ */
function MultiPOModal({order, suppliers, onClose, onCreate, getCombinedDiscrepancy}) {
  const [altSupplier, setAltSupplier] = React.useState('');
  const [buyPrice, setBuyPrice] = React.useState('');
  const [incVAT, setIncVAT] = React.useState(true);
  const [notes, setNotes] = React.useState('');
  const [creating, setCreating] = React.useState(false);

  const discrepancy = getCombinedDiscrepancy(order);
  const isValidDisc = discrepancy > 0;

  async function handleCreate() {
    if (!altSupplier || !buyPrice || discrepancy <= 0) return;
    setCreating(true);
    try {
      const multiPO = {
        id: `MPO-${Date.now()}`,
        orderId: order.orderId,
        originalPOId: order.poId,
        discrepancy: discrepancy,
        alternativeSupplier: altSupplier,
        buyPrice: parseFloat(buyPrice),
        incVAT: incVAT,
        notes: notes,
        status: 'created',
        createdDate: new Date().toISOString(),
        createdBy: window.CURRENT_USER?.name || 'Unknown'
      };
      onCreate(multiPO);
      onClose();
    } catch (e) {
      console.error('Multi PO creation error:', e);
    } finally {
      setCreating(false);
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{padding:24}}>
          <div style={{fontSize:16,fontWeight:700,color:'#1d1d1f',marginBottom:20}}>📦 Create Multi PO</div>
          
          <div style={{background:'rgba(96,165,250,0.08)',border:'1px solid rgba(96,165,250,0.2)',borderRadius:8,padding:16,marginBottom:20}}>
            <div style={{fontSize:11,color:'#86868b',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700,marginBottom:8}}>Order Details</div>
            <div className="grid2">
              <div className="kv">
                <div className="klabel">Order ID</div>
                <div className="kval" style={{wordBreak:'break-word'}}>{(order.orderId||'').slice(-14)}</div>
              </div>
              <div className="kv">
                <div className="klabel">Product</div>
                <div className="kval" style={{fontSize:12}}>{order.productName}</div>
              </div>
              <div className="kv">
                <div className="klabel">Ordered Qty</div>
                <div className="kval" style={{color:'#0071e3'}}>{order.sQty || 0}</div>
              </div>
              <div className="kv">
                <div className="klabel">Received Qty</div>
                <div className="kval" style={{color:'#f97316'}}>{order.qtyReceived || 0}</div>
              </div>
              <div className="kv" style={{gridColumn:'1/-1',background:isValidDisc?'rgba(239,68,68,0.12)':'rgba(99,102,241,0.08)',borderColor:isValidDisc?'rgba(239,68,68,0.3)':'rgba(99,102,241,0.3)'}}>  
                <div className="klabel">Gap to Fill</div>
                <div className="kval" style={{color:isValidDisc?'#ef4444':'#6366f1',fontSize:18}}>{discrepancy > 0 ? `+${discrepancy}` : 'No gap'}</div>
              </div>
            </div>
          </div>

          {isValidDisc && (
            <>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:11,color:'#86868b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,fontWeight:700}}>Alternative Supplier</label>
                <select value={altSupplier} onChange={e=>setAltSupplier(e.target.value)} className="input" style={{cursor:'pointer'}}>
                  <option value="">— Select supplier —</option>
                  <option value="Tesco">Tesco</option>
                  <option value="Ocado">Ocado</option>
                  <option value="Sainsbury's">Sainsbury's</option>
                  <option value="Morrisons">Morrisons</option>
                  <option value="Waitrose">Waitrose</option>
                  <option value="ASDA">ASDA</option>
                  <option value="Amazon UK">Amazon UK</option>
                  <option value="Boots">Boots</option>
                  <option value="Holland & Barrett">Holland & Barrett</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div className="grid2" style={{marginBottom:16}}>
                <div>
                  <label style={{display:'block',fontSize:11,color:'#86868b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,fontWeight:700}}>Buy Price (Per Unit)</label>
                  <input type="number" step="0.01" min="0" value={buyPrice} onChange={e=>setBuyPrice(e.target.value)} className="input" placeholder="0.00"/>
                </div>
                <div>
                  <label style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'#86868b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,fontWeight:700}}>
                    <input type="checkbox" checked={incVAT} onChange={e=>setIncVAT(e.target.checked)} style={{cursor:'pointer'}}/>
                    Including VAT
                  </label>
                  <div style={{padding:10,background:'rgba(255,255,255,0.02)',borderRadius:8,fontSize:10,color:'#86868b'}}>Total: £{(parseFloat(buyPrice||0)*discrepancy).toFixed(2)}</div>
                </div>
              </div>

              <div style={{marginBottom:20}}>
                <label style={{display:'block',fontSize:11,color:'#86868b',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,fontWeight:700}}>Notes</label>
                <textarea value={notes} onChange={e=>setNotes(e.target.value)} className="input" placeholder="Optional notes for fulfillment team..." style={{minHeight:60,resize:'vertical',padding:12}}/>
              </div>

              <div style={{display:'flex',gap:10}}>
                <button onClick={handleCreate} disabled={creating || !altSupplier || !buyPrice} className="btn" style={{flex:1,background:'rgba(34,197,94,0.14)',color:'#22c55e',border:'1px solid rgba(34,197,94,0.3)'}}>
                  {creating ? '⏳ Creating...' : '✓ Create Multi PO'}
                </button>
                <button onClick={onClose} className="btn" style={{background:'#f5f5f7',color:'#86868b',border:'1px solid #d2d2d7'}}>
                  Cancel
                </button>
              </div>
            </>
          )}

          {!isValidDisc && (
            <div style={{padding:16,background:'rgba(96,165,250,0.08)',borderRadius:8,color:'#0071e3',fontSize:12,textAlign:'center'}}>
              ✓ All quantities match — no Multi PO needed
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══ FBA: Mission Control / Personal Reckon ═══ */
function FBAMissionControl({currentUser,role,sheetType}) {
  const [products,setProducts] = React.useState([]);
  const [loading,setLoading] = React.useState(true);
  const [editRow,setEditRow] = React.useState(null); // product being edited/created
  const [search,setSearch] = React.useState('');
  const isOwner = role === 'owner';
  const title = sheetType === 'mission_control' ? '🚀 Mission Control' : '📝 Personal Reckon';
  const subtitle = sheetType === 'mission_control' 
    ? (isOwner ? 'View team members\' verified product sourcing data' : 'Your verified product sourcing data — syncs to Central Command')
    : 'Your informal scratch pad — not synced or checked';

  const loadProducts = React.useCallback(async () => {
    try {
      setLoading(true);
      // Owner sees ALL mission_control entries (from everyone else); non-owners see only their own
      let url = `${API.fbaProducts()}?sheet_type=${sheetType}`;
      if (!isOwner) url += `&owner=${encodeURIComponent(currentUser.email)}`;
      const res = await fetch(url);
      const data = await res.json();
      // Owner: filter out their own entries (they don't source)
      const prods = isOwner ? (data.products || []).filter(p => p.owner_email !== currentUser.email) : (data.products || []);
      setProducts(prods);
    } catch (err) {
      console.error('FBA load error:', err);
    } finally {
      setLoading(false);
    }
  }, [sheetType, currentUser.email, isOwner]);

  React.useEffect(() => { loadProducts(); }, [loadProducts]);

  const handleSave = async (formData) => {
    try {
      const isNew = !formData.id;
      const url = isNew ? API.fbaProducts() : API.fbaProduct(formData.id);
      const method = isNew ? 'POST' : 'PATCH';
      const body = {...formData, sheet_type: sheetType};
      delete body.id;
      const res = await fetch(url, {
        method,
        headers: {'Content-Type':'application/json','x-user-email':currentUser.email,'x-user-role':role},
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setEditRow(null);
      loadProducts();
    } catch (err) {
      alert('Save error: ' + err.message);
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('Delete this product?')) return;
    try {
      await fetch(API.fbaProduct(id), {
        method: 'DELETE',
        headers: {'x-user-email':currentUser.email,'x-user-role':role},
      });
      loadProducts();
    } catch (err) {
      alert('Delete error: ' + err.message);
    }
  };

  const filtered = products.filter(p => {
    if (!search) return true;
    const s = search.toLowerCase();
    return (p.asin||'').toLowerCase().includes(s) || (p.product_name||'').toLowerCase().includes(s) || 
           (p.sku||'').toLowerCase().includes(s) || (p.supplier_name||'').toLowerCase().includes(s);
  });

  return (
    <div style={{padding:'20px 24px',overflowY:'auto',height:'calc(100vh - 52px)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <div style={{fontSize:17,fontWeight:600,color:'#1d1d1f',letterSpacing:'-0.02em'}}>{title}</div>
          <div style={{fontSize:13,color:'#86868b',marginTop:2}}>{subtitle} · {filtered.length} products</div>
        </div>
        {!isOwner&&<button onClick={()=>setEditRow({})} style={{background:'#0071e3',color:'#fff',border:'none',padding:'8px 18px',borderRadius:20,cursor:'pointer',fontSize:13,fontWeight:500}}>+ Add Product</button>}
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ASIN, product, SKU, supplier..." 
        style={{width:'100%',maxWidth:400,padding:'8px 14px',border:'1px solid #e5e5ea',borderRadius:10,fontSize:13,marginBottom:16,outline:'none'}}/>

      {/* Product Edit Modal */}
      {editRow!==null&&<FBAProductForm product={editRow} onSave={handleSave} onClose={()=>setEditRow(null)} allFields={FBA_ALL_FIELDS}/>}

      {loading ? <div style={{textAlign:'center',padding:40,color:'#86868b'}}>Loading...</div> : (
        <div style={{overflowX:'auto',borderRadius:12,border:'1px solid #e5e5ea',background:'#fff'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#f5f5f7',borderBottom:'1px solid #e5e5ea'}}>
                {FBA_DISPLAY_COLS.map(c=><th key={c.k} style={{padding:'8px 10px',textAlign:c.num?'right':'left',fontWeight:600,color:'#1d1d1f',fontSize:11,whiteSpace:'nowrap',width:c.w}}>{c.l}</th>)}
                {!isOwner&&<th style={{width:80,padding:'8px 10px'}}>Actions</th>}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p=>(
                <tr key={p.id} style={{borderBottom:'1px solid #f0f0f5',cursor:isOwner?'default':'pointer'}} onClick={()=>!isOwner&&setEditRow(p)}>
                  {FBA_DISPLAY_COLS.map(c=>(
                    <td key={c.k} style={{padding:'7px 10px',color:c.k==='continue_discontinue'?(p[c.k]==='discontinue'?'#ff3b30':'#34c759'):c.k==='owner_email'?'#0071e3':'#1d1d1f',textAlign:c.num?'right':'left',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:c.w}}>
                      {c.k==='owner_email'?(p[c.k]||'').split('@')[0]:c.num && p[c.k] != null ? Number(p[c.k]).toFixed(2) : (p[c.k]||'—')}
                    </td>
                  ))}
                  {!isOwner&&<td style={{padding:'7px 10px'}}>
                    <button onClick={(e)=>{e.stopPropagation();handleDelete(p.id);}} style={{background:'none',border:'none',color:'#ff3b30',cursor:'pointer',fontSize:12}}>🗑</button>
                  </td>}
                </tr>
              ))}
              {filtered.length===0&&<tr><td colSpan={FBA_DISPLAY_COLS.length+(isOwner?0:1)} style={{padding:40,textAlign:'center',color:'#86868b'}}>{isOwner?'No team products found yet.':'No products yet. Click + Add Product to get started.'}</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ═══ FBA: Product Edit Form (Modal) ═══ */
function FBAProductForm({product,onSave,onClose,allFields}) {
  const [form,setForm] = React.useState({...product});
  const set = (k,v) => setForm(prev=>({...prev,[k]:v}));

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:16,width:'90%',maxWidth:800,maxHeight:'85vh',overflow:'auto',padding:28}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:18,fontWeight:600,color:'#1d1d1f'}}>{product.id ? 'Edit Product' : 'New Product'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#86868b'}}>✕</button>
        </div>

        {allFields.map(section=>(
          <div key={section.section} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:700,color:'#0071e3',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.05em'}}>{section.section}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              {section.fields.map(f=>(
                <div key={f.k}>
                  <label style={{fontSize:11,color:'#86868b',display:'block',marginBottom:3}}>{f.l}</label>
                  {f.type==='bool' ? (
                    <select value={form[f.k]===true?'true':'false'} onChange={e=>set(f.k,e.target.value==='true')} style={{width:'100%',padding:'6px 8px',border:'1px solid #e5e5ea',borderRadius:8,fontSize:13}}>
                      <option value="false">No</option><option value="true">Yes</option>
                    </select>
                  ) : (
                    <input value={form[f.k]||''} onChange={e=>set(f.k,f.type==='num'?e.target.value:e.target.value)} placeholder={f.l}
                      style={{width:'100%',padding:'6px 8px',border:'1px solid #e5e5ea',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))}

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20,paddingTop:16,borderTop:'1px solid #e5e5ea'}}>
          <button onClick={onClose} style={{padding:'8px 20px',border:'1px solid #e5e5ea',borderRadius:20,background:'#fff',cursor:'pointer',fontSize:13}}>Cancel</button>
          <button onClick={()=>onSave(form)} style={{padding:'8px 20px',border:'none',borderRadius:20,background:'#0071e3',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:500}}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ FBA: Central Command (Read-Only Aggregated View) ═══ */
function FBACentralCommand({currentUser,role}) {
  const [products,setProducts] = React.useState([]);
  const [loading,setLoading] = React.useState(true);
  const [search,setSearch] = React.useState('');
  const [expandedId,setExpandedId] = React.useState(null);

  React.useEffect(() => {
    (async () => {
      try {
        setLoading(true);
        const res = await fetch(`${API.fbaProducts()}?sheet_type=mission_control`);
        const data = await res.json();
        setProducts(data.products || []);
      } catch (err) {
        console.error('FBA Central Command load error:', err);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const filtered = products.filter(p => {
    if (!search) return true;
    const s = search.toLowerCase();
    return (p.asin||'').toLowerCase().includes(s) || (p.product_name||'').toLowerCase().includes(s) || 
           (p.sku||'').toLowerCase().includes(s) || (p.supplier_name||'').toLowerCase().includes(s) ||
           (p.owner_email||'').toLowerCase().includes(s);
  });

  // Group by person
  const byPerson = {};
  filtered.forEach(p => {
    const k = p.owner_email || 'Unknown';
    if (!byPerson[k]) byPerson[k] = [];
    byPerson[k].push(p);
  });
  const personList = Object.entries(byPerson).sort((a,b)=>b[1].length-a[1].length);

  return (
    <div style={{padding:'20px 24px',overflowY:'auto',height:'calc(100vh - 52px)'}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:600,color:'#1d1d1f',letterSpacing:'-0.02em'}}>🎯 Central Command</div>
        <div style={{fontSize:13,color:'#86868b',marginTop:2}}>Read-only aggregation of all team Mission Controls · {filtered.length} products from {personList.length} team members</div>
      </div>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ASIN, product, person, supplier..." 
        style={{width:'100%',maxWidth:400,padding:'8px 14px',border:'1px solid #e5e5ea',borderRadius:10,fontSize:13,marginBottom:16,outline:'none'}}/>

      {loading ? <div style={{textAlign:'center',padding:40,color:'#86868b'}}>Loading...</div> : (
        <div style={{overflowX:'auto',borderRadius:12,border:'1px solid #e5e5ea',background:'#fff'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#f5f5f7',borderBottom:'1px solid #e5e5ea'}}>
                {FBA_DISPLAY_COLS.map(c=><th key={c.k} style={{padding:'8px 10px',textAlign:c.num?'right':'left',fontWeight:600,color:'#1d1d1f',fontSize:11,whiteSpace:'nowrap',width:c.w}}>{c.l}</th>)}
              </tr>
            </thead>
            <tbody>
              {filtered.map(p=>(
                <React.Fragment key={p.id}>
                  <tr style={{borderBottom:'1px solid #f0f0f5',cursor:'pointer',background:expandedId===p.id?'#f0f8ff':'transparent'}} onClick={()=>setExpandedId(expandedId===p.id?null:p.id)}>
                    {FBA_DISPLAY_COLS.map(c=>(
                      <td key={c.k} style={{padding:'7px 10px',color:c.k==='continue_discontinue'?(p[c.k]==='discontinue'?'#ff3b30':'#34c759'):c.k==='owner_email'?'#0071e3':'#1d1d1f',textAlign:c.num?'right':'left',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:c.w}}>
                        {c.k==='owner_email' ? (p[c.k]||'').split('@')[0] : c.num && p[c.k] != null ? Number(p[c.k]).toFixed(2) : (p[c.k]||'—')}
                      </td>
                    ))}
                  </tr>
                  {expandedId===p.id&&(
                    <tr><td colSpan={FBA_DISPLAY_COLS.length} style={{background:'#fafafa',padding:16}}>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,fontSize:12}}>
                        {FBA_ALL_FIELDS.flatMap(s=>s.fields).map(f=>(
                          <div key={f.k}><span style={{color:'#86868b'}}>{f.l}:</span> <span style={{color:'#1d1d1f',fontWeight:500}}>{p[f.k]!=null?String(p[f.k]):'—'}</span></div>
                        ))}
                      </div>
                    </td></tr>
                  )}
                </React.Fragment>
              ))}
              {filtered.length===0&&<tr><td colSpan={FBA_DISPLAY_COLS.length} style={{padding:40,textAlign:'center',color:'#86868b'}}>No products in Central Command yet.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ═══ FBA: Expense / Approval Sheet ═══ */
function FBAExpenseApproval({currentUser,role}) {
  const [approvals,setApprovals] = React.useState([]);
  const [loading,setLoading] = React.useState(true);
  const [asinInput,setAsinInput] = React.useState('');
  const [qtyInput,setQtyInput] = React.useState(1);
  const [lookupResult,setLookupResult] = React.useState(null);
  const [lookupError,setLookupError] = React.useState('');
  const [filter,setFilter] = React.useState('all');
  const [purchaseModal,setPurchaseModal] = React.useState(null);

  const loadApprovals = React.useCallback(async () => {
    try {
      setLoading(true);
      const res = await fetch(API.fbaApprovals());
      const data = await res.json();
      setApprovals(data.approvals || []);
    } catch (err) {
      console.error('FBA approvals load error:', err);
    } finally {
      setLoading(false);
    }
  }, []);

  React.useEffect(() => { loadApprovals(); }, [loadApprovals]);

  const handleLookup = async () => {
    if (!asinInput.trim()) return;
    setLookupError('');
    setLookupResult(null);
    try {
      const res = await fetch(API.fbaLookup(asinInput.trim()));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setLookupResult(data.product);
    } catch (err) {
      setLookupError(err.message);
    }
  };

  const handleAddApproval = async () => {
    try {
      const res = await fetch(API.fbaApprovals(), {
        method: 'POST',
        headers: {'Content-Type':'application/json','x-user-email':currentUser.email},
        body: JSON.stringify({asin: asinInput.trim(), qty: qtyInput}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setAsinInput('');
      setQtyInput(1);
      setLookupResult(null);
      loadApprovals();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  };

  const handleDecision = async (id, decision, reason) => {
    try {
      const res = await fetch(API.fbaApprovalDecide(id), {
        method: 'PATCH',
        headers: {'Content-Type':'application/json','x-user-email':currentUser.email,'x-user-role':role},
        body: JSON.stringify({decision, rejection_reason: reason}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      loadApprovals();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  };

  const handlePurchase = async (id, stbId, supplierRef, verifiedTotal) => {
    try {
      const res = await fetch(API.fbaApprovalPurchase(id), {
        method: 'PATCH',
        headers: {'Content-Type':'application/json','x-user-email':currentUser.email},
        body: JSON.stringify({stb_id: stbId, supplier_order_ref: supplierRef, verified_total: verifiedTotal}),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setPurchaseModal(null);
      loadApprovals();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  };

  const filtered = approvals.filter(a => {
    if (filter === 'all') return true;
    return a.approval_status === filter;
  });

  const statusColor = s => ({pending:'#ff9f0a',approved:'#34c759',rejected:'#ff3b30',purchased:'#0071e3'}[s]||'#86868b');

  return (
    <div style={{padding:'20px 24px',overflowY:'auto',height:'calc(100vh - 52px)'}}>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:600,color:'#1d1d1f',letterSpacing:'-0.02em'}}>💰 Expense / Approval</div>
        <div style={{fontSize:13,color:'#86868b',marginTop:2}}>Enter ASIN to pull details from Central Command and approve for purchase</div>
      </div>

      {/* ASIN Lookup */}
      <div className="card" style={{padding:20,marginBottom:20}}>
        <div style={{fontSize:14,fontWeight:600,color:'#1d1d1f',marginBottom:12}}>Search Product</div>
        <div style={{display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div>
            <label style={{fontSize:11,color:'#86868b',display:'block',marginBottom:3}}>ASIN</label>
            <input value={asinInput} onChange={e=>setAsinInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLookup()} placeholder="e.g. B07QRT91FG"
              style={{padding:'8px 12px',border:'1px solid #e5e5ea',borderRadius:8,fontSize:13,width:200}}/>
          </div>
          <button onClick={handleLookup} style={{padding:'8px 16px',background:'#f5f5f7',border:'1px solid #e5e5ea',borderRadius:8,cursor:'pointer',fontSize:13}}>🔍 Lookup</button>
        </div>
        
        {lookupError&&<div style={{marginTop:10,color:'#ff3b30',fontSize:13}}>❌ {lookupError}</div>}
        
        {lookupResult&&(
          <div style={{marginTop:14,padding:14,background:'#f0f8ff',borderRadius:10,border:'1px solid #cce5ff'}}>
            <div style={{fontSize:14,fontWeight:600,color:'#1d1d1f',marginBottom:8}}>✅ Product Found</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,fontSize:12,marginBottom:14}}>
              <div><span style={{color:'#86868b'}}>ASIN:</span> <span style={{fontFamily:'monospace'}}>{lookupResult.asin}</span></div>
