/* ═══ MAIN APP ═══ */
function App() {
  const [currentUser, setCurrentUser] = React.useState(() => {
    try {
      const saved = localStorage.getItem('currentUser');
      return saved ? JSON.parse(saved) : null;
    } catch {
      return null;
    }
  });
  
  const [sessionToken, setSessionToken] = React.useState(() => {
    try {
      return localStorage.getItem('sessionToken') || null;
    } catch {
      return null;
    }
  });

  const [orders, setOrders] = React.useState([]);
  const [orderHistory, setOrderHistory] = React.useState([]); // For Ctrl+Z undo
  const [syncStatus, setSyncStatus] = React.useState('idle');
  const [writeToast, setWriteToast] = React.useState(null);
  const [syncError, setSyncError] = React.useState(null);
  const [screen, setScreen] = React.useState(currentUser ? 'dashboard' : 'login');
  const [activeTab, setActiveTab] = React.useState('operations');
  const [showUsers, setShowUsers] = React.useState(false);
  const [lastSync, setLastSync] = React.useState(null);
  
  // Check if sheet connection is valid (cached for 24 hours)
  const [sheetConnected, setSheetConnected] = React.useState(() => {
    const connTime = parseInt(localStorage.getItem('sheetConnectionTime') || '0');
    const isExpired = Date.now() - connTime > 24 * 60 * 60 * 1000;
    const hasSavedId = !!localStorage.getItem('connectedSheetId');
    return hasSavedId && !isExpired;
  });
  
  // Multi PO state
  const [multiPOs, setMultiPOs] = React.useState(() => {
    try {
      return JSON.parse(localStorage.getItem('multiPOs') || '[]');
    } catch {
      return [];
    }
  });
  const [showMultiPOModal, setShowMultiPOModal] = React.useState(null);
  
  const tokenClientRef = React.useRef(null);
  const role = currentUser?.role || 'packer';
  const ri = ROLES[role];

  // Calculate combined discrepancy for all rows with same Order ID
  const getCombinedDiscrepancy = (order) => {
    const relatedOrders = orders.filter(o => o.orderId === order.orderId);
    const totalBQty = relatedOrders.reduce((sum, o) => sum + (o.bQty || 0), 0);
    const totalQtyReceived = relatedOrders.reduce((sum, o) => sum + (o.qtyReceived || 0), 0);
    return totalBQty - totalQtyReceived;
  };

  // Save Multi POs to localStorage whenever they change
  React.useEffect(() => {
    localStorage.setItem('multiPOs', JSON.stringify(multiPOs));
  }, [multiPOs]);

  // Check if sheet is connected (check localStorage directly, not state)
  const getIsSheetConnected = () => {
    const connTime = parseInt(localStorage.getItem('sheetConnectionTime') || '0');
    const isExpired = Date.now() - connTime > 24 * 60 * 60 * 1000;
    const hasSavedId = !!localStorage.getItem('connectedSheetId');
    return hasSavedId && !isExpired;
  };

  // Restore sheet ID from localStorage on mount
  React.useEffect(() => {
    const saved = localStorage.getItem('connectedSheetId');
    if (saved) {
      window.SHEET_ID = saved;
      setSheetConnected(true);
    }
  }, []);

  // Poll for sheet connection changes (in case LoginScreen connects sheet while on login page)
  React.useEffect(() => {
    const interval = setInterval(() => {
      const isConnected = getIsSheetConnected();
      if (isConnected && !sheetConnected) {
        console.log('📢 Sheet connection detected from LoginScreen');
        setSheetConnected(true);
        const savedId = localStorage.getItem('connectedSheetId');
        window.SHEET_ID = savedId;
      }
    }, 1000); // Check every second
    
    return () => clearInterval(interval);
  }, [sheetConnected]);

  // Create Multi PO
  const createMultiPO = React.useCallback((multiPO) => {
    setMultiPOs(prev => [...prev, multiPO]);
    setWriteToast({ok:true, msg:`✓ Multi PO created for order ${multiPO.orderId.slice(-14)}`});
    setTimeout(() => setWriteToast(null), 3000);
  }, []);

  const syncCell = React.useCallback(async(sheetRow, colIdx, value) => {
    // Use the batching write system that flushes every 5 seconds
    const id = sheetRow || window.SHEET_ID || process.env.SPREADSHEET_ID;
    const cellRef = `Main STB Expenses!${colLetter(colIdx)}${sheetRow}`;
    if (!window._pendingWrites) window._pendingWrites = [];
    window._pendingWrites.push({spreadsheetId: window.SHEET_ID, range: cellRef, values: [[value]]});
  }, []);

  // Listen for write status events
  React.useEffect(() => {
    const handler = (e) => {
      const {ok, count} = e.detail;
      if(ok){
        setWriteToast({ok:true, msg:`✓ Saved ${count} change${count>1?'s':''} to sheet`});
      } else {
        setWriteToast({ok:false, msg:'⚠ Write failed'});
      }
      setTimeout(() => setWriteToast(null), 3000);
    };
    window.addEventListener('sheetsWriteStatus', handler);
    return ()=>{ window.removeEventListener('sheetsWriteStatus', handler); };
  },[]);

  // Track order changes for undo history (max 20 states)
  React.useEffect(() => {
    if (orders.length > 0) {
      setOrderHistory(prev => {
        if (JSON.stringify(prev[prev.length - 1]) !== JSON.stringify(orders)) {
          const newHistory = [...prev, orders];
          return newHistory.length > 20 ? newHistory.slice(-20) : newHistory;
        }
        return prev;
      });
    }
  }, [orders]);

  // Handle Ctrl+Z for undo (with sheet sync)
  React.useEffect(() => {
    const handleKeyDown = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && orderHistory.length > 1) {
        e.preventDefault();
        const currentState = orders;
        const previousState = orderHistory[orderHistory.length - 2];
        if (previousState) {
          // Sync reverted changes back to sheet
          previousState.forEach(prevOrder => {
            const currOrder = currentState.find(o => o.id === prevOrder.id);
            if (currOrder) {
              // Check each syncable field and queue changes if different
              if (prevOrder.weight !== currOrder.weight) syncCell(prevOrder.sheetRow, 24, prevOrder.weight === null || prevOrder.weight === undefined ? '' : prevOrder.weight);
              if (prevOrder.qtyReceived !== currOrder.qtyReceived) syncCell(prevOrder.sheetRow, 28, prevOrder.qtyReceived === null || prevOrder.qtyReceived === undefined ? '' : prevOrder.qtyReceived);
              if (prevOrder.labelPrinted !== currOrder.labelPrinted) syncCell(prevOrder.sheetRow, 31, prevOrder.labelPrinted ? 'TRUE' : 'FALSE');
              if (prevOrder.exceptionReason !== currOrder.exceptionReason) syncCell(prevOrder.sheetRow, 32, prevOrder.exceptionReason || '');
              if (prevOrder.exceptionPOCreated !== currOrder.exceptionPOCreated) syncCell(prevOrder.sheetRow, 34, prevOrder.exceptionPOCreated ? 'TRUE' : 'FALSE');
            }
          });
          
          setOrders(previousState);
          setOrderHistory(prev => prev.slice(0, -1));
          setWriteToast({ok: true, msg: '↶ Undone & synced to sheet'});
          setTimeout(() => setWriteToast(null), 1500);
        }
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [orderHistory, orders, syncCell]);

  async function loadOrders() {
    if (!window.SHEET_ID) {
      console.warn('⚠ No sheet ID set, cannot load orders');
      setSyncStatus('error');
      setSyncError('Sheet ID not configured');
      return;
    }

    setSyncStatus('syncing');
    console.log('📥 Loading orders from sheet:', window.SHEET_ID);
    let rows = [];
    try {
      // Fetch data from backend which reads from Google Sheets (with 120s timeout - sheets API can be slow)
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 120000);
      
      try {
        console.log('Fetching from:', `${window.API_BASE}/api/read?spreadsheetId=${window.SHEET_ID}`);
        const res = await fetch(`${window.API_BASE}/api/read?spreadsheetId=${encodeURIComponent(window.SHEET_ID)}&range=Main%20STB%20Expenses!A3:AN`, {signal: controller.signal});
        clearTimeout(timeout);
        
        if (!res.ok) {
          const errorText = await res.text().catch(() => '');
          console.error('Backend error response:', res.status, errorText);
          throw new Error(`Backend error: ${res.status} - ${res.statusText}. ${errorText}`);
        }
        
        const data = await res.json();
        rows = data.values || [];
        console.log('✓ Fetched', rows.length, 'rows from sheet');
      } catch (fetchErr) {
        clearTimeout(timeout);
        if (fetchErr.name === 'AbortError') {
          throw new Error('Request timeout (120s) - server may be too slow or sheets API connection issue');
        }
        throw fetchErr;
      }
      
      if (!rows || rows.length === 0) {
        console.warn('⚠ No orders found in sheet');
        setSyncStatus('synced');
        setOrders([]);
        return;
      }
      
      // Helper to parse numbers (handles currency symbols, etc)
      const parseNum = (val) => {
        if (!val) return null;
        const str = String(val);
        const cleaned = str.replace(/[£€$]/g, '').replace(/~~[^~]*~~/g, '').trim();
        const matches = cleaned.match(/[\d.]+/g);
        if (matches && matches.length > 0) {
          const nums = matches.map(Number).filter(n => !isNaN(n));
          return nums.length > 0 ? Math.max(...nums) : null;
        }
        return null;
      };
      
      // Parse the rows into order objects
      const parsed = rows.map((r, i) => {
        const orderId = r[2] || null;
        return {
          id: i + 1,
          sheetRow: i + 3,
          orderId: orderId,
          orderDate: r[1] || null,
          productName: r[7] || null,
          totalSellPrice: parseNum(r[9]),
          totalBuyPriceIncVAT: parseNum(r[18]),
          totalBuyPriceExcVAT: parseNum(r[20]),
          shippingCostGBP: parseNum(r[22]),
          expectedProfit: parseNum(r[23]),
          weight: parseNum(r[24]),
          labelPrinted: r[31] === 'TRUE' || r[31] === true,
          status: r[31] === 'TRUE' ? 'packed' : 'pending',
          isDHL: String(r[30] || '').toUpperCase() === 'DHL',
          poId: r[14] || null,
          sQty: parseNum(r[6]),
          bQty: parseNum(r[15]),
          qtyReceived: parseNum(r[28]),
          discrepancy: parseNum(r[29]),
          exceptionReason: r[32] || null,
          exceptionStockSolution: r[33] || null,
          exceptionPOCreated: r[34] === 'TRUE' || r[34] === true,
          goodsNotAvailable: r[35] === 'TRUE' || r[35] === true,
          shipByDate: r[9] || null,
          expectedDeliveryDate: r[26] || null,
          purchasedBy: r[10] || null,
          checkedBy: r[11] || null,
          buyLink: r[13] || null,
          asin: r[4] || null,
          sku: r[5] || null,
          amazonLink: orderId ? `https://sellercentral.amazon.com/orders-v3/order/${orderId}` : null,
          shipStationLink: r[33] || null,
          beingEdited: false
        };
      }).filter(o => o.productName || o.orderId);
      
      setOrders(parsed);
      setOrderHistory([parsed]); // Initialize undo history
      setSyncStatus('synced');
      setLastSync(new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}));
      setSyncError(null);
      console.log(`✓ Loaded ${parsed.length} orders`);
    } catch (err) {
      console.error('❌ Load orders error:', err.message || err);
      setSyncStatus('error');
      setSyncError(err.message || 'Failed to load orders');
      // Keep existing cached orders instead of using fallback demo data
      console.log(`⚠ Using cached data, total orders: ${orders.length}`);
    }
  }

  // Load initially when sheet is connected (no login required for API read)
  React.useEffect(()=>{
    if(!sheetConnected) {
      console.log('⏳ Waiting for sheet connection...');
      return;
    }
    console.log('✓ Sheet connected, starting order load...');
    loadOrders();
  },[sheetConnected]);

  function handleLogin(user) {
    console.log('👤 User logged in:', user.email);
    window.CURRENT_USER = user;
    window.SESSION_TOKEN = localStorage.getItem('sessionToken');
    setCurrentUser(user);
    setScreen('dashboard');
    setActiveTab('operations');
    // Sheet connection will be checked by useEffect
  }

  function handleLogout() {
    window.CURRENT_USER = null;
    window.SESSION_TOKEN = null;
    localStorage.removeItem('currentUser');
    localStorage.removeItem('sessionToken');
    setCurrentUser(null);
    setScreen('login');
  }

  if(screen==='login') return <LoginScreen onLogin={handleLogin}/>;

  if(!sheetConnected) {
    try {
      return <SheetConfigScreen onConnect={(sheetId) => {
        if (sheetId) {
          window.SHEET_ID = sheetId;
          setSheetConnected(true);
          console.log('Sheet connected:', sheetId);
        }
      }}/>;
    } catch (e) {
      console.error('SheetConfigScreen error:', e);
      return <div style={{minHeight:'100vh', background:'#060c18', color:'#ef4444', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column'}}>
        <div style={{fontSize:20, marginBottom:16}}>⚠ Error</div>
        <div style={{fontSize:12, color:'#94a3b8'}}>{e.message}</div>
        <div style={{fontSize:11, color:'#1e3a5f', marginTop:16}}>Check browser console (F12)</div>
      </div>;
    }
  }

  const TABS=[
    ...(ri.canSeeAnalytics?[{k:'dashboard',l:'📊 Dashboard'}]:[]),
    {k:'operations',l:'📦 Operations'},
    {k:'ins',l:'🗃 INS Stock'},
    {k:'issues',l:'⚠ Issues'},
    ...(ri.canSeeAnalytics?[{k:'audit',l:'📋 Audit Log'}]:[]),
  ];

  // Show login screen if not logged in
  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <div style={{minHeight:'100vh',background:'#060c18',display:'flex',flexDirection:'column'}}>
      {/* Write Toast - shows when changes are saved to Google Sheet */}
      {writeToast&&<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:writeToast.ok?'rgba(34,197,94,0.18)':'rgba(239,68,68,0.18)',border:'1px solid '+(writeToast.ok?'#22c55e':'#ef4444'),borderRadius:10,padding:'10px 18px',color:writeToast.ok?'#22c55e':'#ef4444',fontWeight:700,fontSize:13,backdropFilter:'blur(8px)',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>
        {writeToast.msg}
      </div>}
      {/* Top bar */}
      <div style={{borderBottom:'1px solid rgba(255,255,255,0.06)',background:'rgba(6,12,24,0.95)',backdropFilter:'blur(10px)',position:'sticky',top:0,zIndex:200}}>
        <div style={{display:'flex',alignItems:'center',padding:'0 16px',gap:12,height:58}}>
          {/* Logo */}
          <div style={{display:'flex',alignItems:'center',gap:9,marginRight:8}}>
            <div style={{width:34,height:34,background:'linear-gradient(135deg,#1d4ed8,#0ea5e9)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>📦</div>
            <div>
              <div style={{fontWeight:800,fontSize:14,color:'#f1f5f9',letterSpacing:'-0.02em',lineHeight:1.1}}>FBM Ops Hub</div>
              <div style={{fontSize:8,color:'#1e3a5f',letterSpacing:'.08em',textTransform:'uppercase'}}>Babaclick UK→US</div>
            </div>
          </div>

          {/* Nav tabs */}
          <div style={{display:'flex',height:'100%',marginLeft:8}}>
            {TABS.map(t=><button key={t.k} className={`nav-tab ${activeTab===t.k?'active':''}`} onClick={()=>setActiveTab(t.k)}>{t.l}</button>)}
          </div>

          <div style={{flex:1}}/>

          {/* Alerts */}
          {/* Sync */}
          <div style={{display:'flex',alignItems:'center',gap:7,padding:'4px 12px',background:syncStatus==='syncing'?'rgba(251,191,36,0.1)':syncStatus==='error'?'rgba(239,68,68,0.1)':'transparent',borderRadius:6}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:syncStatus==='syncing'?'#fbbf24':syncStatus==='synced'?'#22c55e':'#ef4444',animation:syncStatus==='syncing'?'pulse 1s infinite':undefined}}/>
            <span style={{fontSize:10,color:syncStatus==='error'?'#ef4444':'#1e3a5f'}}>{syncStatus==='syncing'?'Syncing…':syncStatus==='error'?`Error: ${syncError||'Check logs'}`:syncStatus==='synced'?'Connected':'Not connected'}</span>
          </div>

          {/* User pill */}
          <div style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:7,padding:'5px 11px'}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:ri.color}}/>
            <span style={{fontSize:12,color:'#cbd5e1',fontWeight:600}}>{currentUser?.name}</span>
            <span style={{fontSize:9,color:ri.color,fontWeight:700,textTransform:'uppercase'}}>{ri.label}</span>
          </div>

          {ri.canManage&&<button className="btn" style={{background:'rgba(255,255,255,0.04)',color:'#334155',padding:'5px 10px',fontSize:11}} onClick={()=>setShowUsers(true)}>👥</button>}
          <button className="btn" style={{background:'rgba(255,255,255,0.04)',color:'#ef4444',padding:'5px 10px',fontSize:11}} onClick={handleLogout} title="Sign out">🚪 Sign Out</button>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflow:'hidden'}}>
        {orders.length>0&&(
          <>
            {activeTab==='dashboard'&&ri.canSeeAnalytics&&<OwnerDashboard orders={orders}/>}
            {activeTab==='operations'&&<OperationsTable orders={orders} setOrders={setOrders} role={role} syncCell={syncCell} createMultiPO={createMultiPO} getCombinedDiscrepancy={getCombinedDiscrepancy}/>}
            {activeTab==='ins'&&<INSView orders={orders}/>}
            {activeTab==='issues'&&<IssuesView orders={orders} multiPOs={multiPOs}/>}
            {activeTab==='audit'&&ri.canSeeAnalytics&&<AuditLogView/>}
          </>
        )}
        {orders.length===0&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
          <div style={{textAlign:'center',color:'#94a3b8'}}>
            <div style={{fontSize:24,marginBottom:12}}>⏳</div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:16}}>Loading orders…</div>
            <button 
              onClick={loadOrders} 
              style={{background:'rgba(96,165,250,0.2)',border:'1px solid rgba(96,165,250,0.3)',color:'#60a5fa',padding:'8px 16px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:700}}
            >
              Retry Loading
            </button>
            {syncError && <div style={{marginTop:12, fontSize:11, color:'#ef4444'}}>Error: {syncError}</div>}
          </div>
        </div>}
      </div>

      {/* Footer — Status info */}
      <div style={{borderTop:'1px solid rgba(255,255,255,0.06)',background:'rgba(6,12,24,0.95)',backdropFilter:'blur(10px)',padding:'10px 20px',display:'flex',alignItems:'center',gap:16,justifyContent:'space-between',fontSize:11}}>
        <div style={{display:'flex',alignItems:'center',gap:12,flex:1}}>
          <span style={{color:'#94a3b8',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em'}}>FBM Operations Hub</span>
        </div>
        <div style={{color:'#475569',fontSize:10}}>Ready for data loading</div>
      </div>

      {showUsers&&ri.canManage&&<UserManageModal accounts={accounts} onSave={a=>{setAccounts(a);localStorage.setItem('fbm_accounts',JSON.stringify(a));}} onClose={()=>setShowUsers(false)}/>}
      {showMultiPOModal&&<MultiPOModal order={showMultiPOModal} onClose={()=>setShowMultiPOModal(null)} onCreate={createMultiPO} getCombinedDiscrepancy={getCombinedDiscrepancy}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
