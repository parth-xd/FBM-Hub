/* ═══ ERROR BOUNDARY ═══ */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){console.error('UI error',err,info);}
  render(){if(this.state.err){return (
    <div style={{padding:40,color:'#fff',background:'#0b1220',minHeight:'100vh'}}>
      <h2 style={{color:'#ef4444'}}>Application error</h2>
      <pre style={{whiteSpace:'pre-wrap',color:'#f8fafc'}}>{String(this.state.err)}</pre>
      <div style={{marginTop:12}}><button className="btn" onClick={()=>location.reload()}>Reload</button></div>
    </div>
  );}
    return this.props.children;
  }
}

// Global error handlers so we don't get a blank white screen

function calcRMShipping(weightKg) {
  if (!weightKg) return null;
  const r = RM_RATES.find(r => weightKg >= r.wFrom && weightKg < r.wTo) || RM_RATES[RM_RATES.length-1];
  const base = r.priceItem + (r.priceKg * (weightKg > r.wFrom ? weightKg : 0));
  const total = (base * (1 + r.fuel)) + r.duty;
  return Math.round(total * 100) / 100;
}

// ═══ AUDIT LOGGING SYSTEM ═══
const AUDIT_LOG_KEY = 'babaclick_audit_logs';

function logChange(orderId, field, oldValue, newValue, details='') {
  if (!window.CURRENT_USER) return; // Only log if user is logged in
  
  const logEntry = {
    timestamp: new Date().toISOString(),
    user: window.CURRENT_USER.name,
    username: window.CURRENT_USER.username,
    role: window.CURRENT_USER.role,
    orderId: orderId,
    field: field,
    oldValue: oldValue,
    newValue: newValue,
    details: details
  };
  
  // Get existing logs from local storage
  let logs = [];
  try {
    logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
  } catch (e) {
    logs = [];
  }
  
  // Add new log entry
  logs.push(logEntry);
  
  // Keep only last 5000 entries to avoid storage overflow
  if (logs.length > 5000) logs = logs.slice(-5000);
  
  // Save to local storage
  localStorage.setItem(AUDIT_LOG_KEY, JSON.stringify(logs));
  
  console.log(`✓ Logged: ${field} for order ${orderId} by ${window.CURRENT_USER.name}`);
}

// Get audit history for a specific order
function getOrderAuditHistory(orderId) {
  try {
    const logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
    return logs.filter(log => log.orderId === orderId).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  } catch (e) {
    return [];
  }
}

// Get all logs (for admin view) with optional filtering
function getAllAuditLogs(filter = {}) {
  try {
    let logs = JSON.parse(localStorage.getItem(AUDIT_LOG_KEY) || '[]');
    
    if (filter.user) logs = logs.filter(l => l.user === filter.user);
    if (filter.field) logs = logs.filter(l => l.field === filter.field);
    if (filter.startDate) logs = logs.filter(l => new Date(l.timestamp) >= new Date(filter.startDate));
    if (filter.endDate) logs = logs.filter(l => new Date(l.timestamp) <= new Date(filter.endDate));
    
    return logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  } catch (e) {
    return [];
  }
}

function colLetter(idx) {
  let col='',n=idx+1;
  while(n>0){const r=(n-1)%26;col=String.fromCharCode(65+r)+col;n=Math.floor((n-1)/26);}
  return col;
}

async function sheetsGet(sheetId,token) {
  // Read via local backend. Backend uses a service account to access the sheet.
  const id = sheetId || window.SHEET_ID || process.env.SPREADSHEET_ID;
  // Read from row 1 so we can detect headers dynamically (helps keep columns in sync)
  const range = `${SHEET_NAME}!A1:AN`;
  const base = window.API_BASE || '';
  const res = await fetch(`${base}/api/read?spreadsheetId=${encodeURIComponent(id)}&range=${encodeURIComponent(range)}`);
  if (!res.ok) throw new Error(`Sheets read ${res.status}`);
  const j = await res.json();
  return j.values || [];
}

async function sheetsWrite(sheetId,token,sheetRow,colIdx,value) {
  // Queue writes and flush every 5s to reduce chattiness and allow autosave.
  const id = sheetId || window.SHEET_ID || process.env.SPREADSHEET_ID;
  const cellRef = `${SHEET_NAME}!${colLetter(colIdx)}${sheetRow}`;
  if (!window._pendingWrites) window._pendingWrites = [];
  window._pendingWrites.push({spreadsheetId: id, range: cellRef, values: [[value]]});
  return {queued:true};
}

// Append a complete new row to the sheet
async function appendRowToSheet(rowData) {
  const id = window.SHEET_ID || process.env.SPREADSHEET_ID;
  if (!id) {
    console.error('❌ No sheet ID for append');
    return {ok: false, error: 'No sheet ID'};
  }
  
  const base = window.API_BASE || '';
  try {
    console.log('📤 Appending row to sheet. Sheet ID:', id);
    console.log('Row data columns:', rowData.length, 'First few cols:', rowData.slice(0, 5));
    const res = await fetch(base + '/api/append', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        spreadsheetId: id,
        range: SHEET_NAME + '!A:AN', // Full column range for append
        values: [rowData]
      })
    });
    
    const data = await res.json();
    
    if (!res.ok) {
      console.error('❌ Append failed:', res.status, data);
      return {ok: false, error: data.error || res.statusText};
    }
    
    console.log('✓ Row appended to sheet:', data);
    return {ok: true, data};
  } catch (err) {
    console.error('❌ Append error:', err.message);
    return {ok: false, error: err.message};
  }
}

        rowNumber: sheetRow
      })
    });
    
    const data = await res.json();

  }
}

// Simple flush loop: send queued writes every 3s (fast batching)
if (!window._flushIntervalAttached) {
  window._flushIntervalAttached = true;
  setInterval(async () => {
    if (!window._pendingWrites || window._pendingWrites.length === 0) return;
    const batch = window._pendingWrites.splice(0, 10);
    const base = window.API_BASE || '';
    let allOk = true;
    for (const w of batch) {
      try {
        const res = await fetch(base+'/api/write', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(w)});
        if (!res.ok) { allOk = false; console.error('write HTTP error', res.status, w); window._pendingWrites.unshift(w); break; }
      } catch (e) {
        allOk = false;
        console.error('write failed', e, w);
        window._pendingWrites.unshift(w);
        break;
      }
    }
    if (batch.length > 0) {
      window.dispatchEvent(new CustomEvent('sheetsWriteStatus', {detail: {ok: allOk, count: batch.length}}));
    }
  }, 3000);
}

function excelSerialToDate(serial){
  // Excel serial date: days since 1900-01-01 (with Lotus 1900 leap year bug offset)
  const utc_days = Math.floor(serial) - 25569;
  return new Date(utc_days * 86400 * 1000);
}
function parseShipDate(v){
  if(!v||v==='-'||v===''||v==null)return null;
  const num=Number(v);
  // Excel serial: numeric value in plausible date range (year ~2000-2100)
  if(!isNaN(num) && num>36526 && num<73050) return excelSerialToDate(num);
  const d=new Date(v);
  if(!isNaN(d.getTime()))return d;
  return null;
}
function formatDateVal(v){
  if(!v||v==='-'||v==null) return '—';
  const d = parseShipDate(v);
  if(!d||isNaN(d.getTime())) return String(v).slice(0,10);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function ensureProtocol(u){
  if(!u) return null;
  const s=String(u).trim();
  if(!s) return null;
  if(/^https?:\/\//i.test(s)) return s;
  if(s.startsWith('mailto:')||s.startsWith('tel:')) return s;
  return 'https://' + s.replace(/^\/\//,'');
}

/* ═══ SETUP WIZARD ═══ */
function SetupWizard({onDone,onDemo}) {
  const [step,setStep]=useState(0);
  const [clientId,setClientId]=useState('');
  const [sheetUrl,setSheetUrl]=useState('');
  const [testStatus,setTestStatus]=useState(null);
  const [testing,setTesting]=useState(false);

  function extractSheetId(u) {
    const m=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    return m?m[1]:u.trim();
  }

  async function testConnection() {
    const sheetId = extractSheetId(sheetUrl);
    if (!sheetId) { setTestStatus('error: invalid sheet id'); return; }
    setTesting(true);
    try {
      const res = await fetch(`http://localhost:3000/api/read?spreadsheetId=${encodeURIComponent(sheetId)}&range=${encodeURIComponent('Main STB Expenses!A1:A10')}`);
      if (res.ok) {
        const data = await res.json();
        setTestStatus(`success: connected (${data.values ? data.values.length : 0} rows)`);
      } else {
        setTestStatus(`error: ${res.status} ${res.statusText}`);
      }
    } catch (e) {
      setTestStatus(`error: ${e.message}`);
    }
    setTesting(false);
  }

  const instructions = [
    {title:'1. Create Google Cloud Project',steps:['Go to console.cloud.google.com','Click New Project → name it "FBM Hub" → Create','Wait for project to be ready']},
    {title:'2. Enable Google Sheets API',steps:['In left menu: APIs & Services → Library','Search "Google Sheets API" → click it → Enable']},
    {title:'3. Create OAuth Client ID',steps:['APIs & Services → Credentials','Create Credentials → OAuth Client ID','Application type: Web Application','Add your site URL to Authorised JavaScript origins\n(e.g. http://localhost:3000 for local testing)','Copy the Client ID']},
  ];

  if (step<3) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'radial-gradient(ellipse at 50% 10%, rgba(29,78,216,0.1) 0%, transparent 60%)'}}>
      <div style={{width:'min(100%,540px)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:10}}>⚙️</div>
          <div style={{fontSize:22,fontWeight:800,color:'#f1f5f9',letterSpacing:'-0.02em'}}>Google Sheets Setup</div>
          <div style={{color:'#334155',fontSize:12,marginTop:5}}>Step {step+1} of 4</div>
        </div>
        <div className="card" style={{padding:28}}>
          {step<3 && (
            <>
              <div style={{color:'#60a5fa',fontWeight:800,fontSize:14,marginBottom:16}}>{instructions[step].title}</div>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
                {instructions[step].steps.map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',background:'rgba(255,255,255,0.02)',borderRadius:8,padding:'10px 14px',border:'1px solid rgba(255,255,255,0.06)'}}>
                    <div style={{width:20,height:20,borderRadius:'50%',background:'#1d4ed8',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,flexShrink:0}}>{i+1}</div>
                    <div style={{color:'#94a3b8',fontSize:12,whiteSpace:'pre-line',lineHeight:1.6}}>{s}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:10}}>
                {step>0&&<button className="btn" style={{background:'rgba(255,255,255,0.05)',color:'#475569'}} onClick={()=>setStep(s=>s-1)}>← Back</button>}
                <button className="btn" style={{background:'#1d4ed8',color:'#fff',flex:1,justifyContent:'center'}} onClick={()=>setStep(s=>s+1)}>Done, next →</button>
              </div>
            </>
          )}
        </div>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={onDemo} style={{background:'none',border:'none',color:'#1e3a5f',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Skip setup — use demo mode</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'min(100%,520px)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:10}}>🔑</div>
          <div style={{fontSize:22,fontWeight:800,color:'#f1f5f9',letterSpacing:'-0.02em'}}>Enter Credentials</div>
        </div>
        <div className="card" style={{padding:28,display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <div style={{color:'#64748b',fontSize:12,marginBottom:6}}>Google OAuth Client ID</div>
            <input className="input" placeholder="123456789-abc.apps.googleusercontent.com" value={clientId} onChange={e=>setClientId(e.target.value)} />
          </div>
          <div>
            <div style={{color:'#64748b',fontSize:12,marginBottom:6}}>Google Sheet URL or ID</div>
            <input className="input" placeholder="https://docs.google.com/spreadsheets/d/..." value={sheetUrl} onChange={e=>setSheetUrl(e.target.value)} />
            <div style={{color:'#1e3a5f',fontSize:11,marginTop:5}}>Make sure the sheet is shared with your team's Google accounts</div>
          </div>
          {testStatus&&<div style={{background:testStatus.startsWith('success')?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)',border:`1px solid ${testStatus.startsWith('success')?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'}`,borderRadius:8,padding:12,fontSize:11,color:testStatus.startsWith('success')?'#22c55e':'#ef4444'}}>
            {testStatus.split(': ')[1]}
          </div>}
          <button className="btn" disabled={testing||!sheetUrl} style={{background:'rgba(96,165,250,0.1)',color:'#60a5fa',border:'1px solid rgba(96,165,250,0.3)',width:'100%',justifyContent:'center',fontSize:12,marginTop:8}} onClick={testConnection}>
            {testing?'Testing...':'Test Connection →'}
          </button>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <button className="btn" style={{background:'rgba(255,255,255,0.05)',color:'#475569'}} onClick={()=>setStep(2)}>← Back</button>
            <button className="btn" style={{background:'#1d4ed8',color:'#fff',flex:1,justifyContent:'center'}} disabled={!sheetUrl}
              onClick={()=>onDone({clientId:clientId.trim(),sheetId:extractSheetId(sheetUrl)})}>Connect Sheet →</button>
          </div>
        </div>
        <div style={{textAlign:'center',marginTop:16}}>
          <button onClick={onDemo} style={{background:'none',border:'none',color:'#1e3a5f',fontSize:11,cursor:'pointer',textDecoration:'underline'}}>Use demo mode instead</button>
        </div>
      </div>
    </div>
  );
}

function LoginScreen({onLogin}) {
  const [mode, setMode] = React.useState('login'); // 'login' | 'signup'
  const [email, setEmail] = React.useState('');
  const [name, setName] = React.useState('');
  const [role, setRole] = React.useState('importer');
  const [status, setStatus] = React.useState(''); // 'sending', 'sent', 'pending', 'error'
  const [message, setMessage] = React.useState('');
  const [token, setToken] = React.useState(new URLSearchParams(window.location.search).get('token') || '');
  const [sheetId, setSheetId] = React.useState(localStorage.getItem('connectedSheetId') || '');
  const [sheetStatus, setSheetStatus] = React.useState(''); // 'testing', 'connected', 'error'
  const [sheetMessage, setSheetMessage] = React.useState('');

  React.useEffect(() => {
    if (token) {
      verifyToken(token);
    }
  }, []);

  async function sendLoginEmail(e) {
    e.preventDefault();
    if (!email) return;

    // ⚡ OWNER AUTO-LOGIN
    if (email.toLowerCase() === 'parttthh@gmail.com') {
      const demoUser = {
        email: email.toLowerCase(),
        name: 'Parth Sharma',
        role: 'owner',
        loginTime: new Date().toISOString()
      };
      window.CURRENT_USER = demoUser;
      window.SESSION_TOKEN = 'demo-session-' + Date.now();
      localStorage.setItem('sessionToken', window.SESSION_TOKEN);
      localStorage.setItem('currentUser', JSON.stringify(demoUser));
      onLogin(demoUser);
      return;
    }

    setStatus('sending');
    setMessage('');

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(`${window.API_BASE}/api/auth/send-login-email`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email}),
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Failed to send email');
        return;
      }

      if (data.status === 'pending') {
        setStatus('pending');
        setMessage('✓ Awaiting admin approval. You\'ll receive an email when approved.');
      } else {
        setStatus('sent');
        setMessage('✓ Login link sent to ' + email + '. Check your email (15 min expiry).');
      }
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    if (!email || !name || !role) {
      setStatus('error');
      setMessage('Fill all fields');
      return;
    }

    setStatus('sending');
    setMessage('');

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(`${window.API_BASE}/api/auth/signup`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, name, role}),
        signal: controller.signal
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Signup failed');
        return;
      }

      setStatus('pending');
      setMessage('✓ Signup request sent! Awaiting admin approval.');
      setTimeout(() => {
        setMode('login');
        setEmail('');
        setName('');
        setRole('importer');
        setStatus('');
        setMessage('');
      }, 3000);
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

  async function verifyToken(t) {
    try {
      setStatus('sending');
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      const res = await fetch(`${window.API_BASE}/api/auth/verify-token`, {
        signal: controller.signal,
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token: t})
      });
      
      clearTimeout(timeout);
      const data = await res.json();

      if (!res.ok) {
        setStatus('error');
        setMessage(data.error || 'Invalid token');
        return;
      }

      window.CURRENT_USER = data.user;
      window.SESSION_TOKEN = data.sessionToken;
      localStorage.setItem('sessionToken', data.sessionToken);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      
      onLogin(data.user);
    } catch (error) {
      setStatus('error');
      setMessage(error.name === 'AbortError' ? 'Server not responding' : 'Error: ' + error.message);
    }
  }

  const extractSheetId = (input) => {
    if (!input) return null;
    const urlMatch = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if (urlMatch) return urlMatch[1];
    if (input.match(/^[a-zA-Z0-9-_]+$/)) return input;
    return null;
  };

  async function testSheetConnection(e) {
    e.preventDefault();
    if (!sheetId) return;

    const extractedId = extractSheetId(sheetId);
    if (!extractedId) {
      setSheetStatus('error');
      setSheetMessage('Invalid sheet ID or URL format. Use sheet ID or full Google Sheets URL.');
      return;
    }

    setSheetStatus('testing');
    setSheetMessage('Testing connection...');

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000); // 30s timeout

      console.log('Testing sheet connection:', extractedId);

      const response = await fetch(`${window.API_BASE}/api/read?spreadsheetId=${encodeURIComponent(extractedId)}&range=Main%20STB%20Expenses!A1:A1`, {
        method: 'GET',
        signal: controller.signal
      });

      clearTimeout(timeout);

      if (response.ok) {
        // Connection successful
        window.SHEET_ID = extractedId;
        localStorage.setItem('connectedSheetId', extractedId);
        localStorage.setItem('sheetConnectionTime', Date.now().toString());
        setSheetStatus('connected');
        setSheetMessage('✓ Sheet connected successfully!');
        console.log('✓ Sheet connection successful');
      } else {
        const errorData = await response.json().catch(() => ({}));
        const errorMsg = errorData.error || `Backend error (${response.status})`;
        setSheetStatus('error');
        setSheetMessage(`Failed: ${errorMsg}. Verify sheet ID and permissions.`);
        console.error('Sheet connection failed:', {status: response.status, error: errorMsg});
      }
    } catch (error) {
      setSheetStatus('error');
      if (error.name === 'AbortError') {
        setSheetMessage('⏱ Connection timeout (30s). Server may be slow or offline.');
        console.error('Sheet connection timeout');
      } else {
        setSheetMessage('Error: ' + error.message);
        console.error('Sheet connection error:', error);
      }
    }
  }

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24, background:'radial-gradient(ellipse at 30% 20%, rgba(29,78,216,0.1) 0%, transparent 55%), #060c18'}}>

                  background:'rgba(255,255,255,0.05)',
                  border:'1px solid rgba(255,255,255,0.1)',

                  borderRadius:8,
                  padding:'12px 16px',
                  fontSize:13,
                  fontWeight:700,

/* ═══ ORDER DETAIL MODAL ═══ */
function OrderModal({order,role,onClose,onUpdate,syncCell,onCreateMultiPO,setOrders,getCombinedDiscrepancy,orders}) {
  if(!order) return null;
  const [showExceptionForm, setShowExceptionForm] = React.useState(false);
  const [exceptionReason, setExceptionReason] = React.useState('');
  const [partialQtyToSource, setPartialQtyToSource] = React.useState('');
  const [showFulfillmentForm, setShowFulfillmentForm] = React.useState(false);
  const [fulfillmentWeight, setFulfillmentWeight] = React.useState('');
  const [fulfillmentLoading, setFulfillmentLoading] = React.useState(false);
  const [fulfillmentError, setFulfillmentError] = React.useState('');
  const [labelData, setLabelData] = React.useState(null);
  
  const st=rowState(order);
  const s=STATE[st];
  const ri=ROLES[role];
  const sup=order.supplier||getSupplier(order.buyLink);

  function copy(text) { navigator.clipboard?.writeText(String(text||'')); }

  const profit = order.expectedProfit!=null?Number(order.expectedProfit):null;
  const isOverdue = !order.labelPrinted && order.shipByDate && (()=>{const d=parseShipDate(order.shipByDate);return d&&!isNaN(d)&&d<new Date();})();

  // Reasons that require sourcing a new order
  const sourcingReasons = ['Out of Stock', 'Missing Parts', 'Defective - Reclaim Stock'];
  // Reasons that are handled via refund only
  const refundReasons = ['Broken Item', 'Wrong Item Received', 'Customer Refused'];
  // Reasons for partial refund + source new
  const partialRefundReasons = ['Partial Refund - Keep Some'];
  
  const isSourceNewRequired = sourcingReasons.includes(exceptionReason);
  const isPartialRefund = partialRefundReasons.includes(exceptionReason);
  
  // Calculate discrepancy (qty gap) - sum all rows with same Order ID
  const discrepancy = getCombinedDiscrepancy(order);

  const handleCreateExceptionPO = async () => {
    if (!exceptionReason) {
      alert('Please select a reason');
      return;
    }

    if ((isSourceNewRequired || isPartialRefund) && discrepancy <= 0) {
      alert('No discrepancy to source. Order qty matches received qty.');
      return;
    }

    if (isPartialRefund && !partialQtyToSource) {
      alert('Please enter qty to source for partial refund');
      return;
    }

    const qtyToSource = isPartialRefund ? parseInt(partialQtyToSource) || 0 : discrepancy;

    // Case 1: Full Refund (no new order row needed)
    if (refundReasons.includes(exceptionReason)) {
      onUpdate(order.id, {
        exceptionReason: exceptionReason,
        exceptionPOCreated: true,
        status: 'refund_requested'
      });
      syncCell(order.sheetRow, COL.exceptionReason, exceptionReason);
      syncCell(order.sheetRow, COL.exceptionPOCreated, 'REFUND_REQUEST');
      setShowExceptionForm(false);
      setExceptionReason('');
      setPartialQtyToSource('');
      return;
    }

    // Case 2 & 3: Source New (full or partial) - CREATE NEW ROW
    if (isSourceNewRequired || isPartialRefund) {
      if (qtyToSource <= 0) {
        alert('Qty to source must be greater than 0');
        return;
      }

      // Create a new order row with same Order ID but different supplier
      const newMultiPOOrder = {
        id: Math.max(...orders.map(o => o.id || 0)) + 1, // New unique ID
        sheetRow: Math.max(...orders.map(o => o.sheetRow || 0)) + 1, // Next available row
        orderId: order.orderId, // SAME ORDER ID
        asin: order.asin,
        sku: order.sku,
        productName: order.productName + ' [Exception PO - Sourcing Required]',
        sQty: qtyToSource, // Qty to source
        bQty: qtyToSource,
        qtyReceived: null,
        totalSellPrice: order.totalSellPrice * (qtyToSource / (order.sQty || 1)),
        buyLink: null,
        poId: order.poId + '-EXC',
        supplier: 'TBD - Sourcing Required',
        unitBuyPriceIncVAT: null,
        totalBuyPriceIncVAT: null,
        status: 'pending_source',
        multiPO: true,
        exceptionReason: exceptionReason,
        isExceptionPO: true,
        notes: `Exception PO created due to: ${exceptionReason}. Source ${qtyToSource} qty.`,
        createdDate: new Date().toISOString(),
        createdBy: window.CURRENT_USER?.name || window.CURRENT_USER?.email || 'Unknown',
        labelPrinted: false,
        discrepancy: null
      };

      // Add new row to orders list
      setOrders?.(prev => [...prev, newMultiPOOrder]);

      // Create complete row array for appending to sheet (33+ columns)
      const newRowData = [
        '',  // Col 0: unknown
        order.orderDate || '',  // Col 1: orderDate
        order.orderId,  // Col 2: orderId
        '',  // Col 3: unknown
        order.asin,  // Col 4: asin
        order.sku,  // Col 5: sku
        qtyToSource,  // Col 6: sQty
        newMultiPOOrder.productName,  // Col 7: productName
        '',  // Col 8: unknown
        order.totalSellPrice || '',  // Col 9: totalSellPrice
        '',  // Col 10: unknown
        '',  // Col 11: unknown
        '',  // Col 12: unknown
        '',  // Col 13: buyLink (null)
        newMultiPOOrder.poId,  // Col 14: poId
        qtyToSource,  // Col 15: bQty
        '',  // Col 16: unknown
        '',  // Col 17: unknown
        order.totalBuyPriceIncVAT || '',  // Col 18: totalBuyPriceIncVAT
        '',  // Col 19: unknown
        order.totalBuyPriceExcVAT || '',  // Col 20: totalBuyPriceExcVAT
        '',  // Col 21: unknown
        order.shippingCostGBP || '',  // Col 22: shippingCostGBP
        order.expectedProfit || '',  // Col 23: expectedProfit
        '',  // Col 24-25: unknown
        order.expectedDeliveryDate || '',  // Col 26: expectedDeliveryDate
        '',  // Col 27: unknown
        '',  // Col 28: qtyReceived (empty for new)
        '',  // Col 29: unknown
        '',  // Col 30: isDHL
        '',  // Col 31: labelPrinted
        exceptionReason  // Col 32: exceptionReason
      ];

      // Append to Google Sheet
      const appendResult = await appendRowToSheet(newRowData);
      if (!appendResult.ok) {
        console.warn('⚠ Row added to dashboard but failed to sync to Sheet:', appendResult.error);
        // Still success in dashboard, but note the sheet sync failed
      } else {
        console.log('✓ Row synced to Sheet successfully');
      }

      // Also create Multi-PO entry for Issues tab
      const exceptionMultiPO = {
        id: 'EXC-' + Date.now(),
        orderId: order.orderId,
        asin: order.asin,
        discrepancy: qtyToSource,
        alternativeSupplier: 'TBD - Sourcing Required',
        buyPrice: null,
        incVAT: false,
        notes: `Exception PO: ${exceptionReason}. Source ${qtyToSource} qty.`,
        status: 'pending',
        createdDate: new Date().toISOString(),
        createdBy: window.CURRENT_USER?.name || window.CURRENT_USER?.email || 'Unknown',
        isExceptionPO: true
      };

      onCreateMultiPO?.(exceptionMultiPO);

      // Mark original order as having exception PO
      onUpdate(order.id, {
        exceptionReason: exceptionReason,
        exceptionPOCreated: true,
        multiPO: true
      });
      syncCell(order.sheetRow, COL.exceptionReason, exceptionReason);
      syncCell(order.sheetRow, COL.exceptionPOCreated, 'TRUE');
    }

    setShowExceptionForm(false);
    setExceptionReason('');
    setPartialQtyToSource('');
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{border:`1px solid ${s.border}`}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:'18px 22px 14px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',gap:12,alignItems:'flex-start'}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap',marginBottom:8}}>
              <StatusTag state={st}/>
              {order.isDHL&&<span className="dhl-badge">🚚 DHL REQUIRED</span>}
              {order.multiPO&&<span className="mpo-badge">MULTI-PO</span>}
              {isOverdue&&<span className="tag" style={{background:'rgba(239,68,68,0.15)',color:'#ef4444',border:'1px solid #ef444440'}}>⚠ OVERDUE</span>}
              {order.refunded&&<span className="tag" style={{background:'rgba(239,68,68,0.15)',color:'#ef4444',border:'1px solid #ef444440'}}>REFUNDED</span>}
            </div>
            <div style={{fontSize:10,fontFamily:'IBM Plex Mono',color:'#334155',marginBottom:4}}>{order.orderId}</div>
            <div style={{fontSize:14,fontWeight:700,color:'#f1f5f9',lineHeight:1.5,maxWidth:550,marginBottom:6}}>{order.productName||'—'}</div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <SupplierBadge buyLink={order.buyLink}/>
              {order.poId&&<span style={{fontFamily:'IBM Plex Mono',color:'#60a5fa',fontSize:10}}>{order.poId}</span>}
              {order.purchasedBy&&<span style={{color:'#64748b',fontSize:10}}>{order.purchasedBy}</span>}
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.06)',border:'none',color:'#475569',borderRadius:8,width:32,height:32,cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>

        <div style={{padding:'18px 22px',overflowY:'auto',maxHeight:'calc(92vh - 160px)'}}>
          {/* Quick Links */}
          <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
            {ensureProtocol(order.amazonLink)?<a href={ensureProtocol(order.amazonLink)} target="_blank" rel="noopener noreferrer" style={{background:'rgba(249,115,22,0.12)',border:'1px solid rgba(249,115,22,0.3)',color:'#fb923c',borderRadius:8,padding:'7px 14px',textDecoration:'none',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:5}}>🛒 Seller Central</a>:order.amazonLink?<span style={{color:'#94a3b8',padding:'7px 14px'}}>Seller Central</span>:null}

    </div>

/* ═══ OWNER ANALYTICS DASHBOARD ═══ */
function OwnerDashboard({orders}) {
  const stats = useMemo(()=>{
    const shipped = orders.filter(o=>o.labelPrinted);
    const totalRev = orders.reduce((s,o)=>s+(o.totalSellPrice||0),0);
    const totalCost = orders.reduce((s,o)=>s+(o.totalBuyPriceIncVAT||0),0);
    const totalProfit = orders.reduce((s,o)=>s+(o.expectedProfit||0),0);
    const totalShipCost = orders.reduce((s,o)=>s+(o.shippingCostGBP||0),0);
    const marginPct = totalRev > 0 ? (totalProfit/totalRev)*100 : 0;
    const dhlOrders = orders.filter(o=>o.isDHL && Number(o.totalSellPrice||0) >= 300);
    const exceptions = orders.filter(o=>Number(o.discrepancy)>0);
    const refunded = orders.filter(o=>o.refunded);

    // By importer
    const byImporter={};
    orders.forEach(o=>{
      const k=o.purchasedBy||'Unknown';
      if(!byImporter[k]) byImporter[k]={count:0,profit:0,rev:0};
      byImporter[k].count++;
      byImporter[k].profit+=(o.expectedProfit||0);
      byImporter[k].rev+=(o.totalSellPrice||0);
    });
    const importerList = Object.entries(byImporter)
      .filter(([k])=>!['In Stock @ Bletchley','Order Cancellation Flow','Ordered for INS'].includes(k))
      .sort((a,b)=>b[1].count-a[1].count);

    // By supplier
    const bySupplier={};
    orders.forEach(o=>{
      const s=getSupplier(o.buyLink);
      if(!bySupplier[s.name]) bySupplier[s.name]={count:0,color:s.color};
      bySupplier[s.name].count++;
    });
    const supplierList = Object.entries(bySupplier).sort((a,b)=>b[1].count-a[1].count);

    return {
      totalOrders:orders.length,shipped:shipped.length,totalRev,totalCost,totalProfit,totalShipCost,marginPct,dhlOrders,exceptions,refunded,importerList,supplierList,
    };
  },[orders]);

  const maxImporterCount = stats.importerList[0]?.[1]?.count||1;
  const maxSupplierCount = stats.supplierList[0]?.[1]?.count||1;

  return (
    <div style={{padding:'20px 24px',overflowY:'auto',height:'calc(100vh - 58px)'}}>
      <div style={{fontSize:11,color:'#334155',marginBottom:18,letterSpacing:'.06em',textTransform:'uppercase'}}>Owner Analytics · {stats.totalOrders} orders in dataset</div>

      {/* Top KPIs */}
      <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:20}}>
        {[
          {l:'Total Revenue',v:`$${stats.totalRev.toFixed(0)}`,c:'#22c55e',sub:'Sell prices (USD)'},
          {l:'Total Buy Cost',v:`£${stats.totalCost.toFixed(0)}`,c:'#ef4444',sub:'incl. VAT (GBP)'},
          {l:'Total Profit',v:`$${stats.totalProfit.toFixed(0)}`,c:stats.totalProfit>=0?'#22c55e':'#ef4444',sub:'Expected'},
          {l:'Profit Margin',v:`${stats.marginPct.toFixed(1)}%`,c:stats.marginPct>20?'#22c55e':stats.marginPct>0?'#f97316':'#ef4444',sub:'Revenue %'},

/* ═══ AUDIT LOG VIEW ═══ */
function AuditLogView() {
  const [logs, setLogs] = React.useState([]);
  const [filter, setFilter] = React.useState({field: '', user: '', startDate: '', endDate: ''});
  const [selectedOrderId, setSelectedOrderId] = React.useState('');

  React.useEffect(() => {
    const allLogs = getAllAuditLogs();
    setLogs(allLogs);
  }, []);

  const filteredLogs = React.useMemo(() => {
    let result = logs;
    
    if (filter.field) result = result.filter(l => l.field === filter.field);
    if (filter.user) result = result.filter(l => l.user.toLowerCase().includes(filter.user.toLowerCase()));
    if (filter.startDate) result = result.filter(l => new Date(l.timestamp) >= new Date(filter.startDate));
    if (filter.endDate) {
      const endDate = new Date(filter.endDate);
      endDate.setHours(23, 59, 59, 999);
      result = result.filter(l => new Date(l.timestamp) <= endDate);
    }
    if (selectedOrderId) result = result.filter(l => l.orderId === selectedOrderId);
    
    return result;
  }, [logs, filter, selectedOrderId]);

  const exportLogs = () => {
    const csv = [
      ['Timestamp', 'User', 'Role', 'Order ID', 'Field', 'Old Value', 'New Value', 'Details'].join(','),
      ...filteredLogs.map(l => [
        l.timestamp,
        l.user,
        l.role,
        l.orderId,
        l.field,
        String(l.oldValue).replace(/,/g, ';'),
        String(l.newValue).replace(/,/g, ';'),
        (l.details || '').replace(/,/g, ';')
      ].map(v => `"${v}"`).join(','))
    ].join('\n');
    
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `audit-log-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return (
    <div style={{padding:'20px 24px', overflowY:'auto', height:'calc(100vh - 58px)', background:'#060c18'}}>
      <div style={{fontSize:11, color:'#334155', marginBottom:18, letterSpacing:'.06em', textTransform:'uppercase', fontWeight:700}}>📋 Audit Log — Who Changed What & When</div>

      {/* Filters */}
      <div style={{marginBottom:20, display:'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap:12}}>
        <div>
          <label style={{fontSize:10, color:'#94a3b8', display:'block', marginBottom:6, textTransform:'uppercase', fontWeight:700}}>Field Changed</label>
          <select value={filter.field} onChange={e => setFilter({...filter, field: e.target.value})}
            style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#e2e8f0', padding:'8px', fontSize:12}}>
            <option value=''>All Fields</option>
            <option value='labelPrinted'>Label Printed</option>
            <option value='qtyReceived'>Qty Received</option>
            <option value='exceptionReason'>Exception Reason</option>
          </select>
        </div>

        <div>
          <label style={{fontSize:10, color:'#94a3b8', display:'block', marginBottom:6, textTransform:'uppercase', fontWeight:700}}>User</label>
          <input type="text" placeholder="Search by name" value={filter.user} onChange={e => setFilter({...filter, user: e.target.value})}
            style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#e2e8f0', padding:'8px', fontSize:12}}/>
        </div>

        <div>
          <label style={{fontSize:10, color:'#94a3b8', display:'block', marginBottom:6, textTransform:'uppercase', fontWeight:700}}>Start Date</label>
          <input type="date" value={filter.startDate} onChange={e => setFilter({...filter, startDate: e.target.value})}
            style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#e2e8f0', padding:'8px', fontSize:12}}/>
        </div>

        <div>
          <label style={{fontSize:10, color:'#94a3b8', display:'block', marginBottom:6, textTransform:'uppercase', fontWeight:700}}>End Date</label>
          <input type="date" value={filter.endDate} onChange={e => setFilter({...filter, endDate: e.target.value})}
            style={{width:'100%', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#e2e8f0', padding:'8px', fontSize:12}}/>
        </div>

        <div style={{display:'flex', gap:8, alignItems:'flex-end'}}>
          <button onClick={() => setFilter({field: '', user: '', startDate: '', endDate: ''})} style={{flex:1, background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:6, color:'#94a3b8', padding:'8px', cursor:'pointer', fontSize:12, fontWeight:700}}>
            Clear Filters
          </button>
          <button onClick={exportLogs} style={{flex:1, background:'rgba(96,165,250,0.15)', border:'1px solid rgba(96,165,250,0.3)', borderRadius:6, color:'#60a5fa', padding:'8px', cursor:'pointer', fontSize:12, fontWeight:700}}>
            📥 Export CSV
          </button>
        </div>
      </div>

      {/* Log Table */}
      <div style={{background:'rgba(30,58,95,0.2)', border:'1px solid rgba(96,165,250,0.2)', borderRadius:10, overflow:'hidden', marginBottom:20}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:11}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(255,255,255,0.06)', background:'rgba(255,255,255,0.02)'}}>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>Timestamp</th>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>User</th>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>Order ID</th>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>Field</th>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>Old → New Value</th>
                <th style={{padding:'10px 12px', textAlign:'left', color:'#334155', fontWeight:700, textTransform:'uppercase'}}>Details</th>
              </tr>
            </thead>
            <tbody>
              {filteredLogs.length > 0 ? (
                filteredLogs.map((log, idx) => (
                  <tr key={idx} style={{borderBottom:'1px solid rgba(255,255,255,0.03)', background: idx % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.01)'}}>
                    <td style={{padding:'10px 12px', color:'#94a3b8', whiteSpace:'nowrap', fontSize:10}}>{new Date(log.timestamp).toLocaleString()}</td>
                    <td style={{padding:'10px 12px', color:'#60a5fa', fontWeight:600}}>{log.user}</td>
                    <td style={{padding:'10px 12px', color:'#a78bfa', fontFamily:'IBM Plex Mono', fontSize:10, cursor:'pointer'}} onClick={() => setSelectedOrderId(log.orderId)} title="Click to filter">…{(log.orderId || '').slice(-10)}</td>
                    <td style={{padding:'10px 12px', color:'#fbbf24', fontWeight:600}}>{log.field}</td>
                    <td style={{padding:'10px 12px', color:'#e2e8f0', fontFamily:'IBM Plex Mono', fontSize:10, maxWidth:200, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      <span style={{color:'#ef4444'}}>{String(log.oldValue).substring(0, 15)}</span> → <span style={{color:'#22c55e'}}>{String(log.newValue).substring(0, 15)}</span>
                    </td>
                    <td style={{padding:'10px 12px', color:'#64748b', fontSize:9}}>{log.details || '—'}</td>
                  </tr>
                ))
              ) : (
                <tr>
                  <td colSpan="6" style={{padding:'20px', textAlign:'center', color:'#334155', fontStyle:'italic'}}>No audit logs found</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{fontSize:10, color:'#475569', padding:12, background:'rgba(255,255,255,0.02)', borderRadius:8, border:'1px solid rgba(255,255,255,0.05)'}}>
        💡 <strong>{filteredLogs.length}</strong> changes logged {selectedOrderId ? `for order ${selectedOrderId}` : 'total'}
      </div>
    </div>
  );
}

      </div>}
    </div>
  );
}

/* ═══ OPERATIONS TABLE ═══ */
function OperationsTable({orders,setOrders,role,syncCell,createMultiPO,getCombinedDiscrepancy}) {
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [page,setPage]=useState(0);
  const [pageSize,setPageSize]=useState(100);
  const [selected,setSelected]=useState(null);
  const [supplierFilter,setSupplierFilter]=useState('');
  const [deliveryDateFilter,setDeliveryDateFilter]=useState('');
  const ri=ROLES[role];

  const updateOrder=useCallback((id,patch)=>{
    setOrders(prev=>prev.map(o=>o.id===id?{...o,...patch}:o));
    setSelected(prev=>prev&&prev.id===id?{...prev,...patch}:prev);
  },[]);

  const multiPOSet=useMemo(()=>new Set(orders.filter(o=>o.multiPO&&o.orderId).map(o=>o.orderId)),[orders]);

  // Group multi-PO orders together, rest by sheetRow descending
  const sortedOrders=useMemo(()=>{
    const groups={};
    const singles=[];
    orders.forEach(o=>{
      const isMPO=o.multiPO&&o.orderId&&multiPOSet.has(o.orderId);
      if(isMPO){
        if(!groups[o.orderId]) groups[o.orderId]=[];
        groups[o.orderId].push(o);
      } else {
        singles.push(o);
      }
    });
    singles.sort((a,b)=>(b.sheetRow||0)-(a.sheetRow||0));
    const mpoGroups=Object.values(groups).sort((a,b)=>(b[0].sheetRow||0)-(a[0].sheetRow||0));
    const result=[];
    // Interleave: place each MPO group at its position
    const allItems=[...singles.map(o=>({type:'single',o})),...mpoGroups.map(g=>({type:'group',g}))];
    allItems.sort((a,b)=>{
      const aRow=a.type==='single'?a.o.sheetRow:a.g[0].sheetRow;
      const bRow=b.type==='single'?b.o.sheetRow:b.g[0].sheetRow;
      return bRow-aRow;
    });
    allItems.forEach(item=>{
      if(item.type==='single') result.push(item.o);
      else result.push(...item.g);
    });
    return result;
  },[orders,multiPOSet]);

  const filtered=useMemo(()=>{
    let list=sortedOrders;
    if(filter==='shipped') list=list.filter(o=>o.labelPrinted);
    else if(filter==='discrepancy') list=list.filter(o=>Number(o.discrepancy)>0);
    else if(filter==='ready') list=list.filter(o=>rowState(o)==='ready');
    else if(filter==='pending') list=list.filter(o=>rowState(o)==='pending');
    else if(filter==='editing') list=list.filter(o=>o.beingEdited);
    else if(filter==='dhl') list=list.filter(o=>o.isDHL);
    else if(filter==='mpo') list=list.filter(o=>o.multiPO);
    
    if(supplierFilter){
      list=list.filter(o=>getSupplierName(o.buyLink)===supplierFilter||getSupplier(o.buyLink).name===supplierFilter);
    }
    
    if(deliveryDateFilter){
      list=list.filter(o=>{
        const expected=o.expectedDeliveryDate?new Date(o.expectedDeliveryDate).toDateString():'';
        return expected===new Date(deliveryDateFilter).toDateString();
      });
    }
    
    if(search){
      const q=search.toLowerCase();
      list=list.filter(o=>(o.orderId&&o.orderId.toLowerCase().includes(q))||(o.productName&&o.productName.toLowerCase().includes(q))||(o.asin&&o.asin.toLowerCase().includes(q))||(o.sku&&o.sku.toLowerCase().includes(q))||(o.poId&&o.poId.toLowerCase().includes(q))||(o.purchasedBy&&o.purchasedBy.toLowerCase().includes(q))||(o.htsCode&&o.htsCode.includes(q)));
    }
    return list;
  },[sortedOrders,filter,search,supplierFilter,deliveryDateFilter]);

  // Pagination (reset page when filter/search/pageSize changes)
  useEffect(()=>{ setPage(0); },[filtered, pageSize]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / (pageSize || 1)));
  const startIndex = filtered.length===0 ? 0 : page * pageSize;
  const endIndex = Math.min(filtered.length, (page + 1) * pageSize);
  const paged = filtered.slice(startIndex, endIndex);

  const stats=useMemo(()=>({
    total:orders.length,
    shipped:orders.filter(o=>o.labelPrinted).length,
    discrepancy:orders.filter(o=>Number(o.discrepancy)>0).length,
    ready:orders.filter(o=>rowState(o)==='ready').length,
    editing:orders.filter(o=>o.beingEdited).length,
    dhl:orders.filter(o=>o.isDHL).length,
    overdue:orders.filter(o=>{if(o.labelPrinted||!o.shipByDate)return false;const d=parseShipDate(o.shipByDate);return d&&!isNaN(d)&&d<new Date();}).length,
  }),[orders]);

  const FILTERS=[
    {k:'all',l:`All (${stats.total})`},
    {k:'ready',l:`Pack Now (${stats.ready})`,c:'#f97316'},
    {k:'editing',l:`Importing (${stats.editing})`,c:'#10b981'},
    {k:'discrepancy',l:`Issues (${stats.discrepancy})`,c:'#ef4444'},
    {k:'shipped',l:`Shipped (${stats.shipped})`,c:'#22c55e'},
    {k:'dhl',l:`DHL (${stats.dhl})`,c:'#fb923c'},
    {k:'pending',l:'Pending'},
    {k:'mpo',l:'Multi-PO'},
  ];

  // Columns by role
  const packerCols=['status','orderId','product','supplier','shipBy','sQty','bQty','weight','hts','qtyRcvd','disc','label','links'];
  const importerCols=['status','orderId','product','supplier','shipBy','poId','sQty','bQty','weight','buyExcVAT','hts','qtyRcvd','disc','label','lock','links'];
  const cols=ri.seesAll?importerCols:packerCols;

  const COL_W={status:110,orderId:150,product:210,supplier:90,shipBy:88,poId:75,sQty:45,bQty:45,weight:60,buyExcVAT:95,hts:100,profit:78,qtyRcvd:62,disc:48,label:56,lock:48,links:80};
  const COL_H={status:'Status',orderId:'Order ID',product:'Product',supplier:'Seller / Basket',shipBy:'Ship By',poId:'PO ID',sQty:'S-Qty',bQty:'B-Qty',weight:'Weight (kg)',buyExcVAT:'Buy Excl. VAT',hts:'HTS Code',profit:'Profit',qtyRcvd:'Rcvd',disc:'Disc.',label:'Label',lock:'Lock',links:'Links'};

  function renderCell(col, order) {
    const isOverdue=!order.labelPrinted&&order.shipByDate&&new Date(order.shipByDate)<new Date();
    const isMPO=multiPOSet.has(order.orderId)&&order.orderId;
    switch(col) {
      case 'status': return <StatusTag state={rowState(order)} small/>;
      case 'orderId': return <div>
        <div style={{fontFamily:'IBM Plex Mono',color:isMPO?'#60a5fa':'#475569',fontSize:10,fontWeight:isMPO?700:400,lineHeight:1.3}} title={order.orderId}>…{(order.orderId||'').slice(-14)}</div>
        {order.isDHL&&<div style={{marginTop:2}}><span className="dhl-badge" style={{fontSize:8,padding:'1px 5px'}}>DHL</span></div>}
      </div>;
      case 'product': return <div style={{maxWidth:210}}>
        <div style={{color:'#cbd5e1',fontSize:11,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={order.productName}>{order.productName||'—'}</div>
        <div style={{color:'#1e3a5f',fontSize:9,fontFamily:'IBM Plex Mono',marginTop:1}}>{order.asin}</div>
      </div>;
      case 'supplier': {
        const sName = order.sellerName || getSupplierName(order.buyLink);
        const sup2 = getSupplier(order.buyLink);
        return <span style={{display:'flex',flexDirection:'column',gap:2}}>
          <span className="sup-badge" style={{background:sup2.bg,color:sup2.color,border:`1px solid ${sup2.color}35`,fontSize:8,whiteSpace:'nowrap'}}>{sup2.emoji} {sName||sup2.name}</span>
          {sName&&sName!=='Other'&&<span style={{fontSize:8,color:'#7dd3fc',background:'rgba(125,211,252,0.08)',border:'1px solid rgba(125,211,252,0.2)',borderRadius:3,padding:'1px 5px',whiteSpace:'nowrap'}}>{sName} Basket</span>}
        </span>;
      }
      case 'shipBy': return <span style={{fontFamily:'IBM Plex Mono',fontSize:10,color:isOverdue?'#ef4444':'#475569',fontWeight:isOverdue?700:400}}>{formatDateVal(order.shipByDate)}{isOverdue?' ⚠':''}</span>;
      case 'poId': return <span style={{fontFamily:'IBM Plex Mono',color:'#60a5fa',fontSize:10}}>{order.poId||'—'}</span>;
      case 'sQty': return <span style={{fontFamily:'IBM Plex Mono',color:'#475569',fontSize:11,textAlign:'center',display:'block'}}>{order.sQty??'—'}</span>;
      case 'bQty': return <span style={{fontFamily:'IBM Plex Mono',color:'#475569',fontSize:11,textAlign:'center',display:'block'}}>{order.bQty??'—'}</span>;
      case 'weight': return <input type="number" step="0.01" min="0" value={order.weight??''} onClick={e=>e.stopPropagation()}
        onChange={e=>{e.stopPropagation();const v=e.target.value===''?null:Number(e.target.value);updateOrder(order.id,{weight:v});syncCell(order.sheetRow,COL.weight,v===null?'':v);}}
        style={{width:55,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:5,color:order.weight!=null?'#60a5fa':'#475569',textAlign:'center',padding:'4px',fontSize:11,fontFamily:'IBM Plex Mono'}}
        placeholder="kg"/>;
      case 'buyExcVAT': return <span style={{fontFamily:'IBM Plex Mono',color:'#fbbf24',fontWeight:700,fontSize:11}}>{order.totalBuyPriceExcVAT!=null?`£${Number(order.totalBuyPriceExcVAT).toFixed(2)}`:'—'}</span>;
      case 'hts': return <span style={{fontFamily:'IBM Plex Mono',color:'#a78bfa',fontSize:9}}>{order.htsCode||'—'}</span>;
      case 'profit': return <span style={{fontFamily:'IBM Plex Mono',fontSize:11,color:order.expectedProfit!=null?(Number(order.expectedProfit)>=0?'#22c55e':'#ef4444'):'#1e3a5f'}}>{order.expectedProfit!=null?`$${Number(order.expectedProfit).toFixed(2)}`:'—'}</span>;
      case 'qtyRcvd': return <input type="number" min="0" value={order.qtyReceived??''} onClick={e=>e.stopPropagation()}
        onChange={e=>{e.stopPropagation();const v=e.target.value===''?null:Number(e.target.value);const d=order.bQty!=null&&v!=null?Math.max(0,Number(order.bQty)-v):null;updateOrder(order.id,{qtyReceived:v,discrepancy:d});syncCell(order.sheetRow,COL.qtyReceived,v===null?'':v);}}
        style={{width:50,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:5,color:order.qtyReceived!=null&&order.bQty!=null&&Number(order.qtyReceived)<Number(order.bQty)?'#ef4444':'#22c55e',textAlign:'center',padding:'4px',fontSize:11,fontFamily:'IBM Plex Mono'}}/>;
      case 'disc': return <span style={{fontFamily:'IBM Plex Mono',color:Number(order.discrepancy)>0?'#ef4444':'#1e3a5f',fontWeight:Number(order.discrepancy)>0?800:400,fontSize:11}}>{Number(order.discrepancy)>0?order.discrepancy:'—'}</span>;
      case 'label': return <button onClick={e=>{e.stopPropagation();const v=!order.labelPrinted;updateOrder(order.id,{labelPrinted:v});syncCell(order.sheetRow,COL.labelPrinted,v?'TRUE':'FALSE');logChange(order.orderId,'labelPrinted',!v,v,'From table view').catch(console.error);}}
        style={{background:order.labelPrinted?'rgba(34,197,94,0.18)':'rgba(255,255,255,0.03)',border:`1px solid ${order.labelPrinted?'#22c55e40':'rgba(255,255,255,0.07)'}`,color:order.labelPrinted?'#22c55e':'#334155',borderRadius:6,padding:'3px 9px',cursor:'pointer',fontSize:13,fontWeight:700}}>
        {order.labelPrinted?'✓':'○'}
      </button>;
      case 'lock': return ri.canLock?<button onClick={e=>{e.stopPropagation();updateOrder(order.id,{beingEdited:!order.beingEdited});}}
        style={{background:order.beingEdited?'rgba(16,185,129,0.18)':'rgba(255,255,255,0.03)',border:`1px solid ${order.beingEdited?'#10b98140':'rgba(255,255,255,0.07)'}`,color:order.beingEdited?'#10b981':'#334155',borderRadius:6,padding:'3px 8px',cursor:'pointer',fontSize:11,fontWeight:700}}>
        {order.beingEdited?'🔒':'✏'}
      </button>:<span style={{color:'#0f1f35',fontSize:10}}>—</span>;
      case 'links': return <div style={{display:'flex',gap:4}}>
        {order.asin&&<a href={`https://www.amazon.com/dp/${order.asin}`} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Amazon Listing" style={{background:'rgba(148,163,184,0.1)',border:'1px solid rgba(148,163,184,0.25)',color:'#94a3b8',borderRadius:4,padding:'3px 6px',textDecoration:'none',fontSize:10,fontWeight:700}}>ASIN</a>}
        {order.buyLink&&<a href={order.buyLink} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} title="Buy link" style={{background:'rgba(167,139,250,0.1)',border:'1px solid rgba(167,139,250,0.25)',color:'#a78bfa',borderRadius:4,padding:'3px 6px',textDecoration:'none',fontSize:10,fontWeight:700}}>BUY</a>}
      </div>;
      default: return null;
    }
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 58px)'}}>
      {/* Stats bar */}
      <div style={{display:'flex',gap:8,padding:'12px 20px',borderBottom:'1px solid rgba(255,255,255,0.05)',flexWrap:'wrap',alignItems:'center'}}>
        {[
          {l:'Total',v:stats.total},
          {l:'Shipped',v:stats.shipped,c:'#22c55e'},
          {l:'Pack Now',v:stats.ready,c:'#f97316'},
          {l:'Issues',v:stats.discrepancy,c:stats.discrepancy?'#ef4444':'#22c55e'},
          {l:'DHL',v:stats.dhl,c:'#fb923c'},
          ...(ri.seesAll?[{l:'Importing',v:stats.editing,c:'#10b981'}]:[]),
        ].map(({l,v,c})=>(
          <div key={l} style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:8,padding:'7px 14px',display:'flex',gap:8,alignItems:'baseline'}}>
            <span style={{fontSize:9,color:'#334155',textTransform:'uppercase',letterSpacing:'.08em'}}>{l}</span>
            <span style={{fontFamily:'IBM Plex Mono',fontSize:18,fontWeight:800,color:c||'#e2e8f0',lineHeight:1}}>{v}</span>
          </div>
        ))}
        {stats.overdue>0&&<div className="pulse" style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:8,padding:'7px 12px',color:'#ef4444',fontSize:11,fontWeight:700}}>⚠ {stats.overdue} OVERDUE</div>}
        {stats.editing>0&&<div style={{background:'rgba(16,185,129,0.08)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:8,padding:'7px 12px',color:'#10b981',fontSize:11,fontWeight:700}}>🔒 {stats.editing} being imported</div>}
      </div>

      {/* Filters + Search */}
      <div style={{display:'flex',gap:8,padding:'8px 20px',borderBottom:'1px solid rgba(255,255,255,0.04)',flexWrap:'wrap',alignItems:'center'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search order, ASIN, SKU, product, PO, importer…" className="input" style={{width:240,padding:'7px 12px'}}/>
        
        <select value={supplierFilter} onChange={e=>setSupplierFilter(e.target.value)} className="input" style={{width:140,padding:'7px 12px',fontSize:11}}>

          {[...new Set(orders.filter(o=>o.buyLink).map(o=>getSupplier(o.buyLink).name))].sort().map(s=>(
            <option key={s} value={s}>{s}</option>
          ))}
        </select>
        
        <input type="date" value={deliveryDateFilter} onChange={e=>setDeliveryDateFilter(e.target.value)} className="input" style={{width:140,padding:'7px 12px',fontSize:11}} title="Filter by expected delivery date"/>
        
        <div style={{display:'flex',gap:2,background:'rgba(255,255,255,0.02)',borderRadius:7,padding:3,flexWrap:'wrap'}}>
          {FILTERS.map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)} style={{background:filter===f.k?'rgba(29,78,216,0.55)':'transparent',border:'none',color:filter===f.k?'#fff':f.c||'#334155',borderRadius:5,padding:'4px 10px',fontSize:10,cursor:'pointer',fontWeight:700,transition:'all .12s'}}>
              {f.l}
            </button>
          ))}
        </div>
        
        {(supplierFilter||deliveryDateFilter)&&<button onClick={()=>{setSupplierFilter('');setDeliveryDateFilter('');}} style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',color:'#ef4444',borderRadius:5,padding:'4px 8px',fontSize:10,cursor:'pointer',fontWeight:700}}>✕ Clear Filters</button>}
      </div>

      {/* Table */}
      <div style={{padding:'8px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{fontSize:11,color:'#334155',marginRight:6}}>Rows:</div>
          <select value={pageSize} onChange={e=>{const v= e.target.value==='all'?filtered.length: Number(e.target.value); setPageSize(v);}} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',color:'#e2e8f0',padding:'6px 8px',borderRadius:6}}>
            <option value={25}>25</option>
            <option value={50}>50</option>
            <option value={100}>100</option>
            <option value={200}>200</option>
            <option value={500}>500</option>
            <option value="all">All</option>
          </select>
          <div style={{fontSize:12,color:'#94a3b8',marginLeft:8}}>{filtered.length?`${startIndex+1}-${endIndex} of ${filtered.length}`:'0 rows'}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn" style={{padding:'6px 8px'}} onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page<=0}>Prev</button>
          <div style={{fontFamily:'IBM Plex Mono',color:'#aab6c9'}}>{page+1}/{totalPages}</div>
          <button className="btn" style={{padding:'6px 8px'}} onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page+1>=totalPages}>Next</button>
        </div>
      </div>

      <div style={{flex:1,overflowX:'auto',overflowY:'auto'}}>
        <table>
          <thead>
            <tr style={{background:'#060c18'}}>
              {cols.map(c=><th key={c} style={{padding:'7px 12px',textAlign:'left',color:'#1e3a5f',fontWeight:700,fontSize:9,textTransform:'uppercase',letterSpacing:'.06em',whiteSpace:'nowrap',width:COL_W[c],background:'#060c18',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                {COL_H[c]}
              </th>)}
            </tr>
          </thead>
          <tbody>
            {paged.map((order,idx)=>{
              const st=rowState(order);
              const s=STATE[st];
              const isMPO=multiPOSet.has(order.orderId)&&order.orderId;
              const prevOrder=idx>0?paged[idx-1]:null;
              const nextOrder=idx<paged.length-1?paged[idx+1]:null;
              const isGroupStart=isMPO&&(!prevOrder||prevOrder.orderId!==order.orderId);
              const isGroupEnd=isMPO&&(!nextOrder||nextOrder.orderId!==order.orderId);
              return (
                <tr key={order.id} className="datarow" onClick={()=>setSelected({...order})}
                  style={{background:s.bg,borderBottom:`1px solid ${isGroupEnd&&isMPO?'rgba(96,165,250,0.25)':s.border}`,borderTop:isGroupStart?'2px solid rgba(96,165,250,0.3)':undefined}}>

                    <td key={c} style={{padding:'6px 12px',verticalAlign:'middle',borderLeft:c==='status'&&isMPO?'3px solid rgba(96,165,250,0.45)':'none'}}>
                      {renderCell(c,order)}
                    </td>
                  ))}

              );
            })}

          <div style={{width:6,height:6,borderRadius:1,background:s.badge}}/>{s.label}
        </div>)}
        <div style={{color:'#1e3a5f',fontSize:9}}>· Blue left border + blue ID = Multi-PO (grouped together)</div>
        <div style={{color:'#1e3a5f',fontSize:9,marginLeft:'auto',fontFamily:'IBM Plex Mono'}}>{filtered.length}/{orders.length}</div>

    </div>
  );
}

/* ═══ SHEET CONFIG SCREEN ═══ */
function SheetConfigScreen({onConnect}) {
  const [sheetInput, setSheetInput] = React.useState('');
  const [testStatus, setTestStatus] = React.useState(''); // 'testing', 'success', 'error'
  const [testMessage, setTestMessage] = React.useState('');

  async function testConnection() {
    if (!sheetInput.trim()) {
      setTestMessage('Please enter a sheet ID or URL');
      return;
    }

    setTestStatus('testing');
    setTestMessage('');

    try {
      // Extract sheet ID from URL if full URL provided
      let sheetId = sheetInput.trim();
      if (sheetId.includes('/spreadsheets/d/')) {
        sheetId = sheetId.split('/spreadsheets/d/')[1].split('/')[0];
      }

      // Test the connection
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      const res = await fetch(`${window.API_BASE}/api/read?spreadsheetId=${encodeURIComponent(sheetId)}&range=Main%20STB%20Expenses!A1:B1`, {signal: controller.signal});
      clearTimeout(timeout);

      if (!res.ok) {
        setTestStatus('error');
        setTestMessage(`Connection failed: ${res.status}. Check sheet ID and permissions.`);
        return;
      }

      const data = await res.json();
      if (!data.values) {
        setTestStatus('error');
        setTestMessage('Sheet found but no data. Check sheet name is "Main STB Expenses"');
        return;
      }

      // Success! Save connection info
      setTestStatus('success');
      setTestMessage('✓ Connected successfully!');
      
      // Save sheet ID and timestamp to localStorage (24-hour expiry)
      localStorage.setItem('connectedSheetId', sheetId);
      localStorage.setItem('sheetConnectionTime', Date.now().toString());
      window.SHEET_ID = sheetId;

      // Call parent callback after short delay
      setTimeout(() => onConnect(sheetId), 1500);
    } catch (err) {
      setTestStatus('error');
      if (err.name === 'AbortError') {
        setTestMessage('Connection timeout. Check your internet connection.');
      } else {
        setTestMessage('Error: ' + err.message);
      }
    }
  }

  // Load previously saved sheet ID if available and not expired
  React.useEffect(() => {
    const saved = localStorage.getItem('connectedSheetId');
    const connTime = parseInt(localStorage.getItem('sheetConnectionTime') || '0');
    const isExpired = Date.now() - connTime > 24 * 60 * 60 * 1000;

    if (saved && !isExpired) {
      setSheetInput(saved);
    }
  }, []);

  return (
    <div style={{minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', padding:24, background:'radial-gradient(ellipse at 30% 20%, rgba(29,78,216,0.1) 0%, transparent 55%), #060c18'}}>
      <div style={{width: 'min(100%, 500px)'}}>
        <div style={{textAlign:'center', marginBottom:28}}>
          <div style={{width:60, height:60, background:'linear-gradient(135deg,#1d4ed8,#0ea5e9)', borderRadius:16, display:'flex', alignItems:'center', justifyContent:'center', fontSize:30, margin:'0 auto 14px'}}>📊</div>
          <div style={{fontSize:24, fontWeight:800, color:'#f1f5f9', letterSpacing:'-0.02em'}}>Connect Google Sheet</div>
          <div style={{color:'#1e3a5f', fontSize:11, marginTop:5, letterSpacing:'.08em', textTransform:'uppercase'}}>FBM Operations Hub</div>
        </div>

        <div className="card" style={{padding:28, marginBottom:16}}>
          <div style={{marginBottom:18}}>
            <label style={{display:'block', color:'#94a3b8', fontSize:12, marginBottom:8, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em'}}>Google Sheet ID or URL</label>
            <input 
              type="text"
              value={sheetInput}
              onChange={e => setSheetInput(e.target.value)}
              placeholder="Paste your sheet ID or full URL here…"
              style={{
                background:'rgba(255,255,255,0.05)',
                border:'1px solid rgba(255,255,255,0.1)',
                borderRadius:8,
                color:'#e2e8f0',
                padding:'12px 16px',
                fontSize:13,
                width:'100%',

              onKeyPress={e => e.key === 'Enter' && testConnection()}
            />
            <div style={{fontSize:10, color:'#1e3a5f', marginTop:8}}>
              📋 Example: 1YSvua6QlTKGaR7skQiiYXJUaN6WNFIk2GD4eFuX-JW0
            </div>
          </div>

          <button
            onClick={testConnection}
            disabled={testStatus === 'testing'}
            style={{
              width:'100%',
              background: testStatus === 'testing' ? 'rgba(96,165,250,0.2)' : '#1d4ed8',
              color: testStatus === 'testing' ? '#60a5fa' : '#fff',
              border:'none',
              borderRadius:8,
              padding:'12px 16px',
              fontSize:14,
              fontWeight:700,
              cursor: testStatus === 'testing' ? 'not-allowed' : 'pointer',
              opacity: testStatus === 'testing' ? 0.6 : 1,
